body:
  text: 序嘗思著書立説必胸羅萬卷筆無點塵方能成一家言後之人讀古人書亦必與古人心心相印乃能言之不謬慈溪柯韻伯先生注張仲景傷寒論六卷復自著傷寒論翼二卷闡未發之藏探獨得之祕其明辨詳晰使仲景千古不明之案一旦豁然而後世觀柯氏之注論知仲景之精微其功德為何如也但流傳已廣翻刻既多其文義字句類多魚豕觀者未得洞明咸置高閣吾師任䳄鴻波先生出其先祖越菴公手鈔傷寒法祖一編視之即柯氏之論翼惟於錯訛之處細加校正去繁從簡悉已正定無瑕豫因抄而讀之見其分經立論並遵柯氏凡業此者當細心領會得其精義庶涇渭區分自有定見可無擔頭篋里之弊矣嗚呼柯氏為仲景功臣任氏於柯氏之功亦豈少哉爰書以志之道光二十二年歲在壬寅仲春上瀚識於鋤經山房後學清四陶觀永謹識

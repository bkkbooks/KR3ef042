body:
  text: 卷上全論大法第一按仲景自序言作傷寒雜病論合十六卷則傷寒雜病未嘗分為兩書也凡條中不貫傷寒者即與雜病同義如太陽之頭項強痛陽明之胃實少陽之口苦咽乾目眩太陰之腹滿吐利少陰之欲寐厥陰之氣上撞心等症是六經之為病不是六經之傷寒乃是六經分司諸病之提綱非專為傷寒一症立法焉觀五經提綱皆指內症唯太陽提綱為寒邪傷表立五經提綱皆指熱症惟太陰提綱為寒邪傷里立然太陽中暑發熱而亦惡寒太陰傷熱而亦腹痛而吐利但不離太陽主外而太陰主內之定法而六經分症皆兼傷寒雜病也明矣因太陽主表其提綱為外感立法故叔和將仲景之合論全屬傷寒不知仲景已自明其書不獨為傷寒設所以太陽篇中先將諸病線索逐件提清比他經更詳也其曰太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒是傷寒另有提綱矣不特為太陽傷寒之提綱即六經傷寒總綱亦不外是觀仲景獨於太陽篇別其名曰傷寒曰中風曰中暑曰濕痹曰溫病而他經不復分者則一隅之舉可以尋其一貫之理也其他結胸臟結陽結陰結瘀熱發黃熱入血室讝語如狂等症或因傷寒或非傷寒紛紜雜沓之中正可以思傷寒雜病合論之旨矣蓋傷寒之外皆雜病之名多端不可以數計故立六經而分司之傷寒之中最多雜病內外夾雜虛實互呈故將傷寒雜病而合參之正以閣中見涇渭之清濁此扼要法也叔和不知此旨謂痓濕暍三種宜應別論則中風溫病何得與之合論耶以三症為傷寒所致與傷寒相似故此見之則中風非傷寒所致溫病與傷寒不相似者何不為之另立耶霍亂是肝經為患陰陽易瘥後勞復皆傷筋動骨所致咸當屬於厥陰何得另立篇目叔和分太陽三症於前分厥陰諸症於後開後人分門類症之端豈知仲景約法能合百病兼該於六經而不能逃六經之外只在六經上求根本不在諸病名目上尋枝葉也叔和以私意紊亂仲景之原集於勞復後重集可發汗不可發汗諸篇如弱反在關濡反在巔微反在上澀反在下不知如何名反豈濡弱微澀等脈有定位乎此類姑不悉辨其云大法春夏宜發汗冬宜吐秋宜下設未值其時當汗不汗當吐不吐當下不下必待其時耶而且利水清火溫補和解等法概不言及所以今人稱仲景只有汗吐下三法實是於此夫四時者衆人所同受病者因人而異汗吐下者因病而施也立法所以治病非以治時自有此大法之謬後人因有隨時用藥之迂論麻黃桂枝湯者謂宜於冬月嚴寒而三時禁用論白虎湯者謂宜於夏而大禁秋分後與立夏之前夫必先歲氣毋伐天和寒熱溫涼之逆用為衆人飲食之常耳仲景因症立方豈隨時定劑哉當知仲景治法悉本內經按岐伯曰調治之方必別陰陽陽病治陰陰病治陽定其中外各守其鄉外者外治內者內治從外之內者治其外從內之外者調其內從內之外而盛於外者先調其內後治其外從外之內而盛於內者先治其外後調其內中外不相及則治主病又為微者調之其次平之盛者奪之寒熱溫涼衰之以屬隨其攸利此大法也仲景祖述靡遺寓章昭著本論所稱發熱惡寒發於陽無熱惡寒發於陰者是陰陽之別也陽病制白虎承氣以存陰陰病製附子茱萸以扶陽外者用麻黃桂枝以治表內者用芒硝大黃以治里其於表虛里實表熱裡寒發表和表救里攻裡病有淺深治有次第方有輕重是定其中外各守其鄉也太陽陽明並病小發汗太陽陽明合病用麻黃湯是外之內者治其外也陽明病發熱汗出不惡寒反惡熱用梔子豉湯是從內之外者調其內也發汗不解蒸蒸發熱者從內之外而盛於外用調胃承氣先調其內也表未解而心下痞者從外之內而盛於內當先解表乃可攻痞是先治其外後調其內也中外不相及是病在半里半表大小柴胡治主病也此即所謂微者調之其次平之用白虎梔豉小承氣之類盛者奪之則用大承氣陷胸抵當之類矣所云觀其脈症知其何逆以法治之則寒熱溫涼衰之以屬隨其攸利之謂也若拘四時以拘法限三法以治病遇病之變遷則束手待斃矣且汗吐下三法亦出於岐伯而利水清火調補等法悉具焉其曰有邪者漬形以為汗在皮者汗而發之實者散而瀉之此汗家之法中滿者瀉之於內血熱者宜決之是下之之法高者因而越之謂吐下者引而竭之謂利小便慓悍者按而收之是清火法氣虛宜掣引之是調補法也夫邪在皮毛猶未傷形故仲景制麻黃湯急汗以發表邪入肌肉是已傷其形故用桂枝湯吃稀熱粥以解肌是漬形以為汗若邪正交爭內外皆實寒熱互呈故制大青龍於麻桂中加石膏以瀉火是散而瀉之也吐劑有梔豉瓜蒂分胸中虛實之相殊下劑有大小承氣調胃抵當分氣血淺深之不同利水有豬苓真武寒熱之懸絶清火有石膏芩連輩輕重之差分陽氣虛加人參於附子吳茱萸中以引陽陰氣虛加人參於白虎瀉心中以引陰諸法井然質之岐伯絲毫不爽前聖後聖其揆一也愚更有疑焉仲景言平脈辨症為傷寒雜病論是脈與症未嘗兩分也夫因病而平脈則平脈即在辨症中病有陰陽脈合陰陽發熱惡寒發於陽無熱惡寒發於陰是病之陰陽也當列全論之首脈有大浮動滑數名陽沉澀弱弦微名陰是脈之陰陽也此條當為之繼叔和既云搜採仲景舊論録其症候診脈是知叔和另立脈法從此搜採耳試觀太陽篇云脈浮者病在表脈浮緊者法當身疼痛脈浮數者法當汗出愈諸條脈法不入辨脈平脈篇是叔和搜採未盡猶遺仲景舊格也由此推之知寸口脈浮為在表及寸口脈浮而緊脈浮而數諸條皆從此等處採出脈有陰結陽結條未始不在陽明中風中寒之間灑淅惡寒而復發熱者未始不在少陽寒熱往來之部脈陰陽俱緊者未必非少陰之文陰陽相搏條未必不在傷寒脈結代伏之際設仲景另集脈法或有上下之分涼無平辨之別矣名平名辨皆叔和搜採諸說仲景所云各承家伎者是也世徒知序例為叔和之文而不和仲景之書皆系叔和改換獨為傷寒立論十六卷中不知遺棄幾何而六經之文夾雜者亦不少豈猶然仲景舊集哉此雖余見之謬請看序例所引內經莫不增句易字彼尚敢改岐伯之經況乎仲景之論耶欲識真仲景者逐條察其筆法知考功記自不合於周官褚先生大不侔於太史乎世皆以金匱要略為仲景雜病論則有若之似聖人惟曾子為不可強乎六經正義第二按仲景自序云雖未能盡愈諸病其留心諸病可知故於諸病之表裡陰陽分為六經令各得所司清理脈症之異同寒熱之虛實使治病者只在六經中下手行汗吐下和解溫補等法而無失也夫一身之病俱受六經範圍者猶周禮分六官而百職舉司天分六氣而萬物成耳傷寒不過六經中一症叔和不知仲景之六經是經界之經而非經絡之經妄引內經熱病論作序例以冠仲景之書而混其六經之政治六經之理不明而仲景平脈辨症固難盡合諸病之權衡矣夫熱病之六經專主經脈為病但有表裡之實熱並無表裡之虛寒雖因於傷寒而已變成熱病故竟稱熱病而不稱傷寒要知內經熱病即溫病之互名故無惡寒症但有可汗可泄之法並無可溫可補之例也觀溫病名篇亦稱評熱病論其義可知矣夫叔和不於病根上講求但於病名上分解故序例所引內經既背仲景之旨亦舛岐伯之意也夫仲景之六經是分六區地面所該者廣雖以脈為經紀而不專在經絡上立說凡風寒溫熱內傷外感自表及里有寒有熱有實有虛無乎不包故以傷寒雜病合為一症而總名為傷寒雜病論所以六經提綱各立一局不為經絡所拘勿為風寒畫定也然仲景既云撰用素問當於素問之六經廣法之按皮部論云皮有分部脈有經紀其生病各異別有部分左右上下陰陽所在諸經始終此仲景創六經部位之源又曰陽主外陰主內故仲景以三陽主外三陰主內又曰在陽者主內在陰者主出以滲於內故仲景又以陽明主內少陰亦有反發熱者故仲景於表劑中用附子是因其滲也又曰少陰之陰名曰樞儒其入於經也從陽部注於經其出者從陰部注於骨故仲景制麻黃附子湯治發熱脈沉無里症者是從陽部注經之義也製附子湯治身體骨節痛手足寒背惡寒脈沉者具從陰內注於骨之義也又陰陽離合論太陽為開故仲景以之主表而以脈浮惡寒頭項強痛為提綱立言與熱論頗同而立意自別陽明為合故以之主裡而以胃實為提綱雖目痛鼻乾等症而所主不在是少陽為樞少陰亦為樞故皆在半表半裡症少陽為陽樞歸重在半表故以口苦咽乾目眩為提綱而不及於胸脅痛硬少陰為陰樞其欲寐不寐欲吐不吐亦半表半裡症雖有舌乾口燥等症而不入提綱歸重在半里也豈惟陽明主裡三陰皆主裡而陰陽異位故所主各不同陽明主裡症之陽陽道實故以胃實屬陽明太陰主裡症之陰陰道虛故以自利屬太陰太陰為開又為陰中至陰故主裡寒而自利厥陰為合又為陰中之陽故主裡熱而氣逆少陰為陰中之樞故所主或寒或熱之不同或表或里之無定與少陽相似也請以地理論六經猶列國也腰以上為三陽地面三陽主外而本乎表心者三陽夾界之地內由心胸外自巔頂前至頭顱後主肩背下及於足內合膀胱是太陽地面此經統領榮衛主一身之表症猶近邊禦敵之國也內自心胸至胃及腸外自額顱猶面至腹下及於足是陽明地面由心至咽出口頰上耳目斜至巔外自脅內屬膽是少陽地面比太陽差近陽明猶京畿矣腰以下為三陰地面三陰主裡而不及外腹者三陰夾界之地也自腹由脾及二腸魄門為太陰地面自腹至兩腎及膀胱溺道為少陰地面自腹由肝上膈至心從脅肋下及小腹宗筋為厥陰地面此經通行三焦主一身之裡症猶近京夾輔之國矣太陰陽明同居異治猶周召分政之義四經部位有內外出入上下牽引之不同猶先王分土域民犬牙相制之理也若經絡之經是六經道路非六經地面也六經之有正邪客邪合病並病屬脾屬胃者猶寇賊充斥或在本境或及鄰國或入京師也太陽地面最大內臨少陰外鄰陽明故病有相關如小便不利本膀胱經病少陰病亦小便而不利者是邪及少陰之界也六七日不大便頭痛身熱者是陽明熱邪侵入太陽之界也頭項為太陽之通衢因太陽主榮衛心胸是榮衛之本榮衛環周不休猶邊邑之吏民士卒會於京畿往來不絶也如喘而胸滿者是太陽外邪入陽明地面而騷擾故稱為太陽陽明合病若頭不痛項不強胸中痞硬氣上衝咽候不得息者此邪不自太陽來乃陽明熱邪實結於胸中猶亂民聚於本境而為患也心為六經之主故六經皆有心煩症如不頭項強痛則煩不屬太陽不往來寒熱則煩不屬少陽不見三陽症則煩不屬三陽矣故心憒憒心怵惕心懊憹一切虛煩皆屬陽明以心居陽明地面也陽明猶京師故心腹皆居其地邪在心而為虛煩在腹為實熱以心為陽而屬無形腹為陰而屬有形也夫人身之病動關心腹陽邪聚於心陰邪聚於腹肝為陰中之陽故能使陰邪之氣撞於心陽明主在裡之陽故能使陽邪入聚於腹耳更請以兵法喻兵法之要在明地形知賊寇所從來知某方是某府來路某方是某府去路來路是邊關三陽是也去路是內境三陰是也六經來路各不同太陽是大路少陰是僻路陽明是直路太陰近路也少陰後路也厥陰斜路也客邪多從三陽來正邪多因三陰起由外寇自邊關至亂民自內地生也明六經地形始得握百病之樞機詳六經來路乃得操治病之規則如以症論傷寒大寇也病從外來中風流寇也病因旁及雜病亂民也病由中起既認為何等之賊又知為何地所起於其發境便御之本境移禍鄰郡即兩郡夾攻如邪入太陽地面即汗而散之猶陳兵器於要害乘其未定而擊之也邪之輕者在衛重者在榮尤重者在胸膈猶賊之淺者在關外深者在關上尤深者在關內也是麻黃為關外之師桂枝葛根為關上之師大小青龍為關內之師矣凡外寇不靖內地盜賊必起而應之因立兩解法故有大小青龍及桂枝麻黃加減諸方如前軍無紀致內亂蜂起當重內輕外因有五苓十棗陷胸瀉心抵當等湯也邪入少陽地面宜雜用表裡寒熱攻補之品為防禦解利之法如偏僻小路利於短兵不利於矛戟利於守備不利於戰爭也邪之輕者入腠理重者入募原尤重者入脾胃小柴胡腠理之劑也大柴胡募原之劑也小建中半夏瀉心黃芩黃連四方少陽之脾劑也柴胡加芒硝加牡蠣二方少陽之胃劑也如太陽少陽有合病並病是一軍犯少陽矣用柴胡桂枝湯是兩路分擊之師也甚至三陽合併病是三面受敵矣法在獨處陽明陽明之地面肅清則太少兩路之陽邪不攻自解但得內寇寧而外寇自息此白虎所由奏捷耳若陽邪不戰於內地用大承氣以急下之是攻賊以護主若陰邪直入於中宮用四逆湯以急救其里是強主以逐寇也陽明為內地陽朝界上即太陽少陽地面邪入陽明之界近太陽地面雖不犯太陽太陽之師不得坐視而不救故陽明之榮衛病即假麻黃等湯以汗之近少陽地面雖不入少陽少陽之師不得高壘而無戰故陽明之腠理病即借柴胡以解之是知陽明之失守非太陽不固即少陽無備也所以每每兩陽相合而為病也若邪已在陽明地面必出師奮擊以大逐其邪不使少留故用梔豉瓜蒂之吐法以迅掃之若深入內地不可復驅則當清野千里使無所摽掠是又白虎得力處也若邪在內廷又當清宮中陰盜此承氣所由取勝如茵陳豬苓輩又為失紀之師立法矣太陰亦內地少陰厥陰地面是太陰之夾界也太陰居中州雖外通三陽而陰陽既已殊途心腹更有膈膜之藩蔽故寒水之邪從太陽外屬者輕由少陰內授者重風木之邪自少陽來侵者微因厥陰上襲者甚如本經正邪轉屬陽明而為實猶師老勢窮可下之而愈如陽明實邪轉屬本經而成虛則邪盛正衰溫補挽回者甚難蓋太陰陽明地面雖分並無阻隔陽明猶受敵之通衢甲兵所聚四戰之地也太陰猶倉廩重地三軍所依亦盜賊之巢穴也故元氣有餘則邪入陽明元氣不足則邪入太陰在陽明地面則陳師鞠旅可背城一戰取勝須臾在太陰地面則焚劫積蓄倉廩空虛枵腹之士無能禦敵耳厥陰之地相火遊行之區也其本氣則為少火若風寒燥濕之邪一入其境悉化為熱即是壯火其少火為一身之生機而壯火為一身之大患且其地面通達三焦邪犯上焦則氣上撞心心中疼熱消渴口爛咽痛喉痹逼入中焦即手足厥冷脈微欲絶飢不欲食食即吐蛔移禍下焦則熱利下重或便膿血為害非淺猶跋扈之師矣仲景制烏梅丸方寒熱並用攻補兼施通理氣血調和三焦為平治厥陰之主方猶總督內地之大帥也其與之水以治消渴茯苓甘草湯以治水炙甘草湯以復脈當歸四逆以治厥是間出鋭師分頭以救上焦之心主而安神明也用白虎承氣輩清胃而平中焦之熱實白頭翁四逆散清脾而止下焦之熱利是分頭以救腹中之陰而扶胃脘之元氣耳腎為一府而分陰陽二經少陰一經而兼陰陽兩臟者皆為根本之地故也邪有陰陽兩途藏分陰陽二氣如陽邪犯少陰之陽反發熱心煩咳渴咽痛陽邪犯少陰之陰則腹痛自利或便膿血陰邪犯少陰之陽則身體骨節痛手足逆冷背惡寒而身倦臥陰邪犯少陰之陰則惡寒嘔吐下利清穀煩躁欲死仲景制麻黃附子細辛黃連阿膠甘草桔梗豬膚半夏苦酒等湯御陽邪犯少陰之陽也其制桃花豬苓等湯御陽邪入少陰之陰也附子吳萸四逆等湯御陰邪犯少陰之陽也通脈四逆茯苓四逆乾薑附子等湯御陰邪入少陰之陰也少陰為六經之根本而外通太陽內接陽明故初得之而反發熱與八九日而一身手足盡熱者是少陰陽邪侵及太陽地面也自利純青水心下痛口燥舌乾者少陰陽邪侵陽明地面也出太陽則用麻黃為鋭師而督以附子入陽明則全任大承氣而不設監製是猶兵家用嚮導與本部不同法也其陰邪侵入太陰則理中四逆加人尿豬膽等法亦猶是矣嗟乎不思仲景之所集安能見病知原也合併啓微第三病有定體故立六經而分司之病有變遷更求合病並病而互參之此仲景立法之盡善也夫陰陽互根氣雖分而神自合三陽之底便是三陰三陰之表即是三陽矣如太陽病而脈反沉便合少陰少陰病而反發熱便合太陽陽明脈遲即合太陰太陰脈緩即合陽明少陽脈細小是合厥陰厥陰微浮是合少陽雖無合併之名而有合併之實或陽得陰而解陰得陽而解或陽入陰而危陰亡陽而逆種種脈症不可枚舉學者當於陰陽兩症中察病勢合不合更於三陽三陰中審其症之並與不並於此陰病治陽陽病治陰扶陽抑陰瀉陽補陰等法用之恰當矣三陽皆有發熱症三陰皆有下利症如發熱而下利是陰陽合病也陰陽合病陽盛者屬陽經則下利為實熱如太陽陽明合病少陽陽明合病太陽少陽合病必自下利用葛根黃芩等湯者是也陰盛者屬陰經則下利屬虛寒如少陰病吐利反發熱者不死少陰病下利清穀裡寒外熱不惡寒而面色赤用通脈四逆者是也若陽與湯合不合於陰即是三陽合病則不下利而自汗出為白虎症也陰與陰合不合於陽即是三陰合病則不發熱而吐利厥逆為四逆症也並病與合病稍異者合則一時並見並則以次相乘如太陽之頭項強痛未罷遞見脈弦眩冒心下痞硬等症是與少陽並病更見讝語即是三陽並病矣太陽與陽明並病太陽症未罷者從太陽而小發汗太陽症已罷者從陽明而下之其機在惡寒惡熱而分也然陽明之病在胃家實太陽陽明合病喘而胸滿者不可下恐胃家未實耳如陽明與太少合病必自下利何以得稱陽明要知夾熱下利即胃實之始內經所云暴注下迫皆屬乎熱其脈必浮大弦大故得屬之陽明而不經於太陰也若下利清穀裡寒外熱脈浮而遲者則浮不得屬之於表而遲則為在臟若見脈微欲絶即身不惡寒而面色赤者又當屬之少陰蓋太陽陽明下利之辨在清穀不清穀而太陰少陰之清穀又在脈之遲與微為辨也夫陽明主胃實而有夾熱利太陰主下利清穀又因脈微細而屬少陰少陰脈微下利反見陽明之不惡寒而面色赤若不於合併病參之安知病情之變遷如此而為之施治哉然此為六經言耳若六經之合併與內傷外感之合併神而明之不可勝極以陰陽互根之體見陰陽離合之用是知六經之準繩更屬定不定法矣何漫云三陰無合病並病也哉風寒辨惑第四風寒二氣有陰陽之分又相因為患蓋風中無寒即是和風一夾寒邪中人而病故得與傷寒相類亦得以傷寒名之所以四時皆有風寒而冬月為重也傷寒中風各有重輕不在命名而在見症太陽篇言中風脈症者二一日太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之一日太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之以二症相較陽浮見寒之輕浮緊見寒之重汗出見寒之輕不汗出見寒之重嗇嗇淅淅見風寒之輕翕翕見發熱之輕發熱惡寒見寒熱之俱重鼻鳴見風之輕身疼見風之重自汗乾嘔見煩之輕不汗煩躁見煩之重也言傷寒脈症者二一曰太陽病或未發熱或已發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒脈浮自汗出小便數心煩微惡寒腳攣急以二症相較微惡寒見必惡寒之重體痛覺腳攣急之輕自汗出小便數心煩見傷寒之輕或未發熱見發熱之難必先嘔逆見傷寒之重脈浮見寒之輕陰陽俱緊見寒之重中風傷寒各有輕重如此今人必以傷風為輕中風為重但知分風寒之中傷而不辨風寒之輕重於是有傷寒見風中風見寒之遁辭也夫風為陽邪寒為陰邪雖皆因於時氣之寒而各不失其陰陽之性故傷寒輕者全似中風獨腳攣急不是蓋腰以上為陽而風傷於上也中風重全似傷寒而煩躁不是蓋寒邪嘔而不煩逆而不燥也然陰陽互根煩為陽邪煩極至躁躁為陰邪躁極致煩故中風輕者煩輕中風重者煩躁傷寒重者躁煩傷風重者微煩微煩則惡寒亦微是微陽足以勝微寒故脈浮不緊矣如本論所云凡欲自解者必當先煩乃有汗而解以脈浮不緊故知汗出解也若不待自解而妄攻其表所以亡陽因陽微故耳凡傷寒見煩則寒氣欲解躁煩是陽為寒鬱而邪轉盛故傷寒一日若躁煩者為欲傳六七日躁煩者為陽去入陰也因病入所稟之陽氣有不同而受邪之部位陰陽更不類故陽有多少熱有微甚如太陽為先天之巨陽其熱發於榮衛故一身手足壯熱陽明乃太少兩陽相合之陽其熱發於肌肉故蒸蒸發熱少陽為半表之陽其熱發於腠理時開時合故往來寒熱此三陽發熱之差別也太陰為至陰無熱可發因為胃行津液以灌四旁故得主四肢而發熱於手足所以太陰傷寒手足自溫太陰中風四肢煩疼耳少陰為封蟄之本若少陰不藏則坎陽無蔽故有始受風寒而脈沉發熱者或始無表熱八九日來熱入膀胱致一身手足盡熱者厥陰當兩陰交盡一陽之初生其傷寒者有從陰而先厥後熱者有從陽而先熱後厥者或陽進而熱多厥少或陽退而熱少厥多或陰陽和而厥與熱相應者是三陰發熱之差別也太陽為父多陽盛之病如初服桂枝而反煩解半日許而後煩下之而脈仍浮氣上撞與不汗出而煩躁服藥微除而煩瞑發衄者皆陽氣重故也少陰為雌多亡陽之病如下利清穀手足厥逆脈微欲絶惡寒蜷臥吐利汗出裡寒外熱不煩而躁皆亡陽故也又內經病形篇云邪中於項則下太陽中於面則下陽明中於頰則下少陽其中膺背兩脅亦中其經故本篇太陽受邪有中項中背之別中項則頭項強痛中背則背強𠘧𠘧也陽明有中面中膺之別中面則目痛鼻乾中膺則胸中脅下痞硬也此岐伯中陽溜經之義又云邪中於陰從臂胻始自經及臟藏氣實而不能容則邪還於府故本篇論三陰皆有自利症是寒邪還府也三陰皆有可下症是熱邪還府也此岐伯中陰溜府之義六經之部位有高下故受邪之日有遠近太陽為三陽居表位最高最易傷寒故一日受陽明為二陽而居前故二日受少陽為一陽而居側故三日受太陰為三陰居陰位最高故四日受少陰為二陰居陰位之中故五日受厥陰為一陰居三陰之盡故六日受此皆言見症之期非六經以次相傳之日也內經曰氣有高下病有遠近適其至所即此義也按本論傳字之義各各不同必牽強為傳經之謬傷寒一日太陽受之脈若靜者為不傳是指熱傳本經不是傳陽明之經絡陽明無所復傳始雖惡寒二日自止是止寒傳本經不是傳少陽之經絡陽明無所復傳始雖惡寒二日自止是止寒傳本經不是傳少陽之經絡傷寒二三日陽明少陽症不見者為不傳皆指熱傳本經不是二日傳陽明三日傳少陽之謂太陽病至七日以上自愈者以行其經盡故也言七日當來復之辰太陽一經之病當盡非日傳一經也七日復傳太陽之謂若復傳則不當曰盡若日傳一經則不當日行其經矣若欲再作經是太陽不罷而並病陽明使經不傳是使陽明之經不傳太陽之熱非再傳少陽之謂也太陽與陽明少陽地面相近故太陽之盛而不罷使轉屬陽明陽已衰而不罷使轉系少陽若陽陷則轉系太陰陽虛則轉入少陰陽逆則轉入厥陰矣陽明萬物所歸故六經皆得轉屬而陽明無所復傳是知陽明無轉屬少陽之病陽明太陰俱屬於胃胃實則太陰轉屬陽明胃虛則陽明轉屬太陰矣少陰與二陰地面相近受太陰之寒則吐利清穀受厥陰之熱則咽痛便血也厥陰為陰之盡亦如陽明之無復傳然陰出之陽則熱多厥少陰極亡陽則熱少厥多此即少陽往來寒熱之變局按本論云太陽病發熱汗出惡風脈緩者為中風又云太陽中風脈浮緊不汗出而煩躁又云陽明中風脈弦浮大不得汗合觀之不得以無汗謂非中風矣本論云太陽病或未發熱或已發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒而未嘗言無汗又云太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之此不冠傷寒又不言惡寒又云傷寒脈浮自汗出微惡寒合觀之又不得以有汗非傷寒矣今人但據桂枝條之中風自汗而不究傷寒亦有自汗出者強以麻黃症為無汗之傷寒而不究中風最多無汗者謂傷寒脈浮緊中風脈浮緩而不知傷寒亦有浮緩中風亦有浮緊者知三陽脈浮三陰脈沉而不知三陰皆有浮脈三陽亦有沉脈者總是據一條之說不理會全書耳當知麻黃湯大青龍湯治中風之重劑桂枝湯葛根湯治中風之輕劑傷寒可通用之非主治傷寒之劑也世皆推桂枝湯為中風主劑而不敢以大青龍為中風之劑者是惑於中風見寒傷寒見風之謬不敢以麻黃湯為中風之劑者是泥於有汗為中風無汗為傷寒之謬也風為陽邪因四時之氣而變遷且一日亦具四時之氣而運更有郁復淫勝之不同故有麻黃桂枝葛根青龍等法當知四時俱有中風傷寒不得拘春傷於風冬傷於寒之一說也太陽經多中風方麻黃附子細辛真武附子茱萸白通四逆通脈等湯是也中風諸方可移治傷寒傷寒諸方不可治中風者寒可溫而風不可以熱治也風為陽邪故中風者在少陰每多陽症寒為陰邪故傷寒者雖在太陽每多陰症太陽經多中風症陽從陽也少陰經多傷寒症陰從陰也夫風者善行而數變故脈症皆不可拘自變者觀之其症或自汗鼻鳴或無汗而喘或不汗出而煩躁或下利嘔逆或渴欲飲水或往來寒熱或口舌咽乾或短氣腹滿鼻乾嗜臥或目赤耳聾胸滿而煩或四肢煩疼種種不同其脈或浮緩或浮緊或弦而浮大或陽微陰澀或陽微陰浮亦種種不同自不變也觀之惟浮是中風之主脈惡風是中風之定症蓋風脈變態不常而浮為真體風症變幻多端而惡風其真情也仲景廣設諸方以曲盡常變耳夫寒之傷人也有三早晚霧露四時風雨冬春霜雪此天之寒氣也幽居曠室磚地土階大江深澤邃谷名山地之寒氣也好飲寒泉喜食生冷酷嗜瓜果誤服冷藥人之寒氣也此義最淺傷寒諸書莫之或及而以冬寒春溫時疫之症掩之何不求致病之因而歸時令之變耶夫寒固為冬氣三時豈必無寒第寒有輕重傷亦有輕重不拘定於冬溫固為春氣而三時亦病溫且溫隨時而發者多因冬月傷寒所致者少不可謂必然之道也即冬時病溫亦因其人陰虛而發豈冬時之暖氣即有毒以傷人乎若時行疫氣正天地溫熱之毒如涼風一起疫即自散豈遇寒而反重耶疫與寒為風馬牛不相及何得以寒冠時行之疫若為暴寒所折而病即是三時之傷寒勿得忘以疫名之矣謂三四月陽氣尚弱為寒折而病熱輕五六月陽氣已盛為寒折而病熱重七八月陽氣已衰為寒折而病熱微此叔和之莫須有也夫病寒病熱當審其人陰陽之盛衰不得拘天時之寒熱天氣之寒熱以傷人必因其人陰陽之多少元氣之虛實為輕重不全憑時令之陰陽為轉移也所以仲景立方全以平脈辨症為急務不拘於受病之因不拘於發病之時為施治如夏月盛暑而傷寒吐利多有用姜附吳萸而始效隆冬嚴寒而病溫多有用石膏硝黃而熱乃解者謂麻黃桂枝二湯只宜於冬月之正傷寒三時不可輕用其失豈不多乎夫開口言傷寒動手反用寒涼克伐之劑曷不於傷寒二字顧名思義耶寒傷於表法當溫散寒傷於裡法當溫補仲景治傷寒只有溫散溫補二法其清火涼解吐下等法正為溫暑時疫而設所以治熱非以治寒治熱淫於內非治寒傷於表也今傷寒家皆曰仲景治溫治暑必另方治法今遺失而無徵傷寒只有汗吐下三法將溫補正法置之不用反曰治傷寒無補法於是人傷於天地之寒者輕復傷於醫師之法者重死於寒食之內傷者少死於寒藥之內傷者多耳溫暑指歸第五內經論傷寒而反發熱者有三義有當時即發者曰人傷於寒則為病熱也有過時發熱者曰冬傷於寒春必病溫也有隨時易名者曰凡病傷寒而成濕者先夏至日為病溫後夏至日為病暑也夫病溫病暑當時即病者不必論凡病傷寒而成者其病雖由於冬時之傷寒而根實種於其人之鬱火內經曰藏於精者春不病溫此明冬傷於寒春必病溫之源先夏至日為溫病後夏至日為暑病申明冬不藏精春必病溫之故夫人傷於寒則為病熱其恆耳此至春夏而病者以其人腎陽有餘好行淫欲不避寒冷雖外傷於寒而陽氣足以御之但知身著寒而不為寒所病然表寒雖不內侵而虛陽亦不得外散仍下陷入陰中故身不知熱而亦不發熱所云陽病者上行極而下也冬時行收藏之令陽不遽發寒愈久則陽愈匿陽日盛則陰日虛若寒日多而蓄熱淺則陰火應春氣而病溫若寒日多而鬱熱深則陰火應夏氣而病暑此陰消陽長從內而達於外也叔和不知此義謂寒毒藏於肌膚至春變為溫病至夏變為暑病夫寒傷於表得熱則散何以能藏設無熱以御之必深入腑臟何以只藏於肌膚且能藏者不能變何以時換其所藏乎不知原其人之自傷而但咎其時之外傷只知傷寒之因不究熱傷其本妄擬寒毒之能變熱不知內陷之陽邪發見其本來面目也又謂辛苦之人春夏多溫熱病者皆因冬時觸寒所致而非時行之氣不知辛苦之人動搖筋骨凡動則為陽往往觸寒即散或因飢寒而病者有之或因勞倦而發熱者有之故春夏之時辛苦之人因虛而感時行之氣者不少矣若夫春夏之濕熱由冬時觸寒所致者偏在飽暖淫欲之人不知持滿醉以入房以竭其精以耗其真陽強不能密精失守而陰虛故移禍至於春夏也內經論溫之脈症治法甚詳學者多不得要領仲景獨挈發熱而渴不惡寒者為提綱悉溫病之底蘊合內經冬不藏精之旨矣熱論以口燥舌乾而渴屬少陰少陰者封蟄之本精之處也少陰之表名曰太陽太陽根起於至陰名曰陰中之陽故太陽病當惡寒此發熱而惡寒者是陽中無陰矣而即見少陰之渴太陽之根本悉露矣於此見逆冬氣則少陰不藏腎氣獨沉孤陽無時而發為溫病也溫病症治散見六經請類推之如傷寒發熱不渴服湯已渴者是傷寒溫病之關也寒去而熱罷即傷寒欲解症寒去而熱不解是溫病發見矣如服桂枝湯大汗出後大煩渴不解脈洪大者即是溫勢猖狂用白虎加人參預保元氣於清火之時是凡病傷寒而成溫者之正治法也因所傷之寒邪隨大汗而解所成之溫邪隨大汗而發焉得無虛設不加參則熱邪從白虎而解安保寒邪不從白虎而來乎是傷者當補治病必求其本耳如服柴胡渴已渴者屬陽明者也以法治之夫柴胡湯有參甘薑棗皆生津之品服已反渴是服寒之劑不足以解溫邪少陽相火直走陽明也是當白虎加人參法若柴胡加人參之法非其治矣夫相火寄甲乙之間故肝膽為發溫之源腹胃為市故陽明為成溫之藪陽明始雖惡寒二日自止即不惡寒而反惡熱此亦病傷寒而成溫之一徵也若夫溫熱不因傷寒而致者只須扶陰折陽不必補中益氣矣且溫邪有淺深治法有輕重如陽明病脈浮發熱渴欲飲水小便不利者豬苓湯主之瘀熱在裡不得越身體發黃渴欲飲水小便不利者茵陳湯主之少陰病得之二三日口燥咽乾者大承氣湯急下之厥陰病下利欲飲水者白頭翁湯主之此仲景治溫之大略也夫溫與暑偶感天氣而病者輕因不藏精者為自傷其病重若再感方土之異氣此三氣相合而成溫疫也溫熱利害只在一人溫疫移害禍延鄰里今人不分溫熱溫疫渾名溫病令人惡聞而諱言之因於辭之害義矣吳又可溫疫論程效倩熱病注俱有至理可傳愚不復贅余義詳見方論痓濕異同第六風寒濕暑燥熱六氣為病皆能發熱然寒與熱相因暑與熱相繼獨燥與濕相反風寒溫暑皆因天氣而濕病多得之地氣燥病多得之內因此病因之殊同也內經病機十九條其分屬六氣者火居其人風寒濕者居其一燥症獨無若諸痓項強皆屬於濕愚嘗疑其屬燥今本論有痓濕之分又曰太陽病發汗太多因致痓則痓之屬燥可知也夫痓以狀名因血虛而筋急耳六氣為患皆足以致痓然不熱則不燥不燥則不成矣六經皆有痓病須審部位以別之身以後屬太陽則凡頭項強急頭背𠘧𠘧脊強反張腰似折髀不可以曲𩪐如結皆其症也身之前者屬陽明頭項搖動口禁齒齘缺盆紐痛腳攣急皆其症也身之側屬少陽口眼喎斜手足牽引兩脅拘急半身不遂皆其症也若腹內拘急因吐利而四肢拘急是太陰痓惡寒蜷臥尻以代踵脊以代頭俯而不能仰者是少陰痓睪丸上升宗筋下注小腹裡急陰中拘牽膝脛拘急者厥陰痓也若痓之挾風寒者其症發熱無汗而惡寒氣上撞胸而小便少其脈必堅緊其狀必強直而口噤此得天之氣內經所云諸暴強直皆屬於風者是其勢勇猛故曰剛痓病自外來當逐邪而解外痓有夾本邪而為外患者其邪從內出故發熱汗出而不惡寒其脈沉遲其狀則項背強𠘧𠘧此得之地氣內經所云諸痓項強皆屬於濕者是也其勢耎弱故名柔痓病因於內也當滋陰以和內治濕君栝蔞根者非以治風實以生津非以治濕實以潤燥耳夫痓之始也本非正病必夾雜於他病之中人之病此者世醫悉指為風所以不明其理善醫者必於他症中審察而預防之如頭項強痛即痓之一端是太陽之血虛故筋急也今人但知風寒不恤津液所以發汗太多因致痙者多矣夫痓本有由來一經妄治即奇形必見項背強𠘧𠘧是痓之徵兆故用葛根身體強是痓狀已著故用栝蔞根臥不著席腳攣急口禁齒齘是痓之極甚故用大黃芒硝無非用多津多液之品以滋養陰血不得與當汗當下者同例也觀傷寒脈浮自汗心煩惡寒而見腳攣急是痓勢已成須當滋陰存液不得仍作傷寒主治故與桂枝湯則厥與芍藥甘草湯其腳即伸此明驗矣第以表症未除不得用承氣若讝語者少與調胃承氣是又與不著席者與大承氣同一機彀也凡痓之為病因外邪傷筋者少因血虛筋急者多如誤作風治用辛散以助陽則真陰愈虛因燥劑以驅風則血液愈涸故痓得之暴起者少妄治而致者多虛而不補不死何待非參苓歸地調和榮衛未易奏捷也內經曰諸濕腫滿皆屬於脾又曰濕勝則濡泄此指濕傷於內者言也又曰地之濕氣感則害人皮肉筋骨又曰因於濕首如裹此指濕傷於外者言也若濕而兼熱則大筋耎短而為拘小筋弛長而為痿即柔痓之變見矣陽明篇有濕熱發黃之症叔和不為別論獨取太陽之風濕相傳者尚遺數條亦搜採之疏失也內經曰身半以上者風中之也身半以下者濕中之也中陽則溜於經中陰則溜於腑又曰陽受風氣陰受濕氣故傷於風者上先受之傷於濕者下先受之皆風濕對言本論則風濕合言也風濕相合則陰陽相傳上下內外反病矣所以身體煩疼不能轉側骨節掣痛不能屈伸小便不利大便反快也內經曰風濕之傷人也血氣與邪並客與分腠之間其勢堅大故曰實寒濕之中人也皮膚不收肌肉堅緊營血澀衛氣去故曰虛此又以血家虛實因風寒而分也本論傷寒發汗寒濕在裡不解身目為黃與陽明之熱不得越瘀熱在裡身體發黃者當下不當下亦以寒濕濕熱分虛實矣內經以風寒濕三氣合而為痹本論又合風寒濕熱四氣而名濕痹當知痹與痓皆由濕變矣夫同一濕也濕去燥極則為痓久留而著則為痹痹為實痓為虛痓痹異形虛實亦殊固不得妄以痓屬風亦不得因於濕而竟視痓為濕矣痓濕余義詳內經注及本論注中平脈準繩第七浮大動滑數沉澀弱弦遲上古以三部九候中決死生是遍求法以人迎寸口趺陽辨吉凶是扼要法自難經獨取寸口之說行而人迎趺陽不參矣氣口成寸為脈之大會死生吉凶系焉今所傳者只此耳自有脈經以來諸家繼起各以脈名取勝泛而不切漫無指歸夫在診法取其約於脈名上著其繁此仲景所云馳競浮華不因根本者是也仲景立法只在脈之體用上推求不在脈之名目上分疏故以陰陽為體則以浮大動滑數為陽之用沉澀弱弦遲為陰之用以表裡為體則以浮為表用沉為里用以臟腑為體則以數為腑用遲為臟用如以浮沉為體則以浮沉中各有遲數為用以浮為體則以大動滑數為用之常澀弱弦遲為用之變以沉為體則以澀弱弦遲為用之常大數滑動為用之變體用之間見脈之變化而致病之因與病情之虛實病機之轉移亦隨之而見全在診者指法之功與看法之細耳脈理浩繁大綱不外名陰名陽之十種陰陽兩分自成對峙陰陽配偶惟見五端浮沉是脈體大弱是脈勢滑澀是脈氣動弦是脈形遲數是脈息不得概以脈象視之也脈有對看法有正看法有反看法有平看法有仄看法有徹底看法如有浮即有沉有大即有弱有滑即有澀有數即有遲合之於病則浮為在表沉為在裡大為有餘弱為不足滑為血多澀為氣少動為搏陽弦為搏陰數為在腑遲為在臟此對看法也如浮大動滑數脈氣之有餘者為陽當知其中有陽勝陰病之機沉弦弱澀弦遲脈氣之不足者名陰當知其中有陰勝陽病之機此正看法也夫陰陽之轉旋也有餘而往不足隨之不足而往有餘從之故其始也為浮為大為滑為動為數其繼也反沉反弱反澀反弦反遲者為陽消陰長之機其病為進其始也為沉為弱為澀為弦為遲其繼也微浮微大微滑微動微數者是陽進陰退之機其病為欲愈此反看法也浮為陽如更兼大動滑數之陽脈是為純陽必陽盛陰虛之病矣沉為陰而更兼弱澀弦遲之陰脈是為重陰必陰盛陽虛之病矣此為平看法如浮而數浮而澀浮而弦浮而遲者此陽中有陰其人陽虛而陰脈伏於陽脈中也將亡陽之變當以扶陽為急務矣如沉而大沉而滑沉而動沉而數此陰中有陽其人陰虛而陽邪下陷於陰脈也將有陰竭之患當以存陰為深慮也此為仄看法如浮大動滑數之脈雖不變然始為有力之強陽終為無力之微陽知陽將絶矣沉澀弱弦微遲之脈雖無變而為陽如忽見浮大動滑數之狀是陰極似陽知反照之不長餘燼之易滅也是為徹底看法更有真陰真陽之看法如凡陰病見陽脈者生陽病見陰脈者死也成注只據傷寒立言觀凡字則知脈法不專為傷寒說亦不是按承上文擴充之見仲景治法以脈以胃氣為本觀名陰名陽見此等脈狀尚是陰陽之名而非陰陽之實因胃氣稍虛則陰陽偏重較之平脈有餘名陽不足名陰耳此陽病兼外傷六氣言陰病兼內傷精氣言若專指傷寒之陰症陽症則淺矣陽脈指胃脘之真陽內經所謂二十五陽者是也陰病見陽脈是胃氣來復五臟沖和之氣發見故主生內經所云別於陽者知病起時也陰脈指五臟之真陰因胃脘之陽不至於手太陰五臟之真陰來見也陽病見陰脈是脈無胃氣故主死內經所謂別於陰者知死生之期也要知沉澀弦弱遲是病脈不是死脈其見於陽病最多陽病浮大動數滑不休即為死脈陰病見浮大動數滑之脈多陰極似陽未必即可生之機也若真臟脈至如肝脈之中外急心脈堅而搏肺脈大而浮腎脈如彈石脾脈如距啄皆反見有餘之象豈可以陽脈名之經曰邪氣來也緊而疾穀氣來也徐而和則又不得以遲數論陰陽矣仲景表裡臟腑之法則又以浮沉遲數為大綱浮沉是審起伏遲數是察至數浮沉之間遲數寓焉脈之不浮不沉而在中不遲不數而五至者謂之平脈是有胃氣可以神求不可以象求也若一見浮沉遲數之象斯為病矣浮沉遲數本不可以表裡臟腑分今既有陰陽之可名即以陽表陰里腑陽臟陰定其為陰陽所在耳試觀脈之浮為在表應病亦為在表然浮脈亦有里症或表邪初陷或里邪初欲出究竟不離於表故主表其大綱也沉象在裡應病亦為在裡沉脈亦有表症或陽病見於陰而危或陰出之陽而愈究竟病根於裡故主裡其大綱也數為陽陽主熱而數有沉浮浮數應表熱沉數應裡熱雖數脈多有病在臟者然其由必自腑蓋六腑為陽陽脈縈其腑故主腑其大綱也遲為陰陰主寒而遲有浮沉浮遲應表寒沉遲應裡寒雖遲脈多有病在腑者然其根必自臟蓋五臟為陰陰脈縈其臟故主臟其大綱也脈狀總總該括於浮沉遲數然四者之中又以獨浮獨沉獨遲獨數為準則而獨見何部即以其部定表裡臟府之所在病無遁情矣然陰陽之十脈表裡臟府之四診皆指脈之體用言而診法之體用則又以病為體而脈為用矣請以浮脈言之其他可類推如浮脈者病在表則必有發熱惡寒之表症然浮有不同有但浮者有三部皆同息數無遲數其氣象亦無滑澀動弦大小此太陽之脈體然也因風寒在表而巨陽之陽御之內無太過不及之病故見此象此病脈中之平脈故可用麻黃湯發汗而頓解然此脈不可多得所以發熱即有發熱之脈象惡寒即見惡寒之脈象如寸口脈浮而緊是浮為風象緊為寒象也此為陽中有陰乃陽脈之變見矣然寒不協風則玄府不開寒在皮毛衛氣足以衛外而為固雖受寒而不傷寒去而身自和矣若風不夾寒但能鼓動衛氣使玄府不閉皮膚受邪脈氣不清而已不能深入於營而發熱惡寒頭項骨節俱痛惟風夾寒邪其勢始猛此風則傷衛寒則傷營初非有二義也衛氣不能衛外反內擾營氣而為煩營氣不得交通內迫於骨節而作痛營衛俱病發熱所由來耳如脈浮而數為陽中見陽是陽脈之正局然不得即認為陽脈有餘實因陽氣不足反見有餘之象也夫脈為血府實由氣行長則氣治短則氣病弦脈象長數脈象短脈數因於氣之不足則數為虛可知風為陽邪風則為熱虛因寒邪虛則為寒虛寒相搏於營衛衛氣不足以御之此惡寒所由來也上條陽中有陰而反徵其發熱此條陰中見陽同反徵其惡寒是互文以見意此二脈皆當發汗而已但脈者不同故又云脈緊者法當身疼痛宜以汗解之假令尺中遲不可發汗以營氣不足血少故也可知用麻黃湯專治傷寒營者皆仲景法矣又云脈浮數者法當汗出而愈若尺中脈微此裡虛不可發汗則又見脈浮數者不得概用麻黃又云傷寒解半日許復煩脈浮數者可更發汗宜桂枝湯則所云須表裡實津液自和便自汗出愈者為啜稀粥示法耳夫人之尺脈如樹之有根不拘浮數浮緊皆據尺以審虛實此又仲景自作浮為在表之注疏矣十脈中無緊脈即弦之轉旋當知按之不移是靜為陰之體轉索無常是動為陽之用故浮中見緊者緊在中風與傷寒之陰陽俱緊者殊矣緊又與數相似緊見於法象數見於至數然緊以氣來之長反得為陰中有陽之實脈數以氣來之短反得兩陽合明之象然脈浮不俱大必至三日乃大是陽明內熱外見之脈此浮不得仍為在表當知大為病進故見心下反硬而攻之不令發汗耳若脈浮而遲面熱赤而戰栗者是陽中見陰故面見假熱而身真寒此因遲為在臟故無陽不能作汗而浮為在表則又當漬形為汗之法矣遲因浮而從表浮因大而從里浮兼數而反虛緊入浮而或實則表裡臟腑陰陽虛實之間悉屬定不定法也余義見六經病解

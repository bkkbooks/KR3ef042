body:
  text: 卷下大陽病解第一仲景六經各有提綱一條猶大將立旗鼓使人知所向故必擇本經至當之脈症而標之讀者須用緊記提綱以審病之所在然提綱可見者只是正面讀者又要看出底板再細玩其四旁參透其隱曲則良法美意始得了然如太陽總綱提出脈浮頭項強痛惡寒八字是太陽受病之正面讀者要知三陽之脈俱浮三陽俱有頭痛症六經受寒俱各惡寒惟頭項強痛是太陽所獨也故見頭連項而強痛知是太陽受病蓋太陽為諸陽主氣頭為諸陽之會項為太陽之會故也如脈浮惡寒發熱而頭不痛項不強便知非太陽病如但頭痛不及於項亦非太陽定局矣如頭項強痛反不惡寒脈反沉不可為非太陽病故溫邪內發或吐後內煩或濕流關節或病關少陰法當救里者也因當浮不浮當惡不惡故為之反所謂看出底板法者以此前輩以一日太陽二日陽明七日復傳之説拘之故至今不識仲景所稱之太陽病太陽病有身痛身重腰痛骨節疼痛鼻鳴乾嘔嘔逆煩躁胸滿背強咳渴汗出惡風無汗而喘等症仲景以其或然或否不可拘定故散見諸節而不入提綱又太陽為巨陽陽病必發熱提綱亦不言及者以初受病者或未發故也其精細如此故診者於頭項強痛之時必須理會此等兼症更細審其惡寒惡風之病情有汗無汗之病機已發熱未發熱之病勢以探其表症之虛實是從旁細看法也即於此處辨其有汗是桂枝症無汗是麻黃症無汗煩燥是大青龍症乾嘔發熱而咳是小青龍症項背強𠘧𠘧是葛根症用之恰當效如桴鼓前輩以桂枝主風傷衛麻黃主寒傷營大青龍主傷寒見風中風見寒分三綱鼎立之勢拘之所以埋沒仲景心法又敗壞仲景之正法脈浮只講得脈體之正面診者當浮中審其脈勢之強弱脈息之遲數脈象之緊緩滑澀弦芤故太陽一經有但浮浮弱浮緩浮緊浮遲浮數等症散見於諸條或陽浮而陰弱或陰陽俱緊或陰陽俱浮或尺中遲或尺中微或寸緩關浮尺弱必細細體認以消息其里之虛實此是從中索隱法若謂脈緊是傷寒脈緩是中風脈緊有汗是中風見寒脈緩無汗是傷寒見風夫既有傷寒中風之別更有傷寒中風之渾使人無下手處矣豈可為法乎凡見脈浮遲浮弱者用桂枝浮緊浮數者用麻黃不必於風寒之分但從脈之虛實而施治是仲景活法是亦仲景之定法今傷寒書皆以膀胱為太陽故有傳足不傳手之謬不知仲景書只宗陰陽之大法不拘陰陽之經絡也夫陰陽者散之可千推之可萬以心為陽中之太陽故更稱巨陽以尊之又中身而上名曰廣明太陰之前名曰陽明廣明亦君主之尊稱廣明居陽明之上故六經分位首太陽次陽明又腰以上為陽膀胱位列下焦之極底其經名為足太陽以手足陰陽論實陰中之少陽耳以六腑為陽論與小腸之太陽同為受盛之器耳不得渾膈膜之上為父之太陽也仲景以心為太陽故得外統一身之氣血內行五臟六腑之經隧若膀胱為州都之官所藏精液必待上焦之氣化而後能出何能外司營衛而為諸陽主氣哉岐伯聖人南面而立前曰廣明後曰太衝太衝之地名曰少陰是心腎為一身之大表里也膀胱與腎為表裡第足經相絡之一義耳是表裡亦何常之有如太陽與少陽並病刺肺俞肝俞豈非肝居膽外為少陽之表肺居心外為太陽之表耶少陰病一身手足盡熱以熱在膀胱必便血夫熱在膀胱而仍稱少陰病是知膀胱屬腰以下之陰得為少陰之府不得為六經之太陽故不稱太陽病又太陽不解熱結膀胱其人如狂以太陽隨經瘀熱在裡熱在下焦下血乃愈蓋太陽位最高故太陽病以頭項強痛為提綱此云熱結在下焦是太陽陽邪下陷之變也其云隨經云在裡是知膀胱屬在下焦為太陽之根底而非主表之太陽為太陽之經隧而非太陽之都會為太陽主血之裡非為諸陽主氣之太陽也明矣傷寒最多心痛以心當太陽之位也心為君主寒為賊邪君火不足寒氣得以為之所以名為大病今傷寒家乃以太陽為寒水之經是拘於膀胱焉水府因有以寒召寒之説而不審寒邪犯心水來剋火之義矣夫人傷於寒熱雖甚不死者以寒所在是邪之所留熱之所在是心之所主也如初服桂枝而反煩解半日而復煩大青龍之煩躁小青龍之水氣十棗瀉心之心下痞硬白虎五苓之燥渴心煩皆心病也若妄治後叉手冒心恍惚心亂以下逆滿往往關心是心病為太陽本病也然心為一身之主六經皆能病及故陽明有憒憒怵惕懊憹等症少陽有煩悸支結等症太陰之暴煩少陰之心中溫溫欲吐厥陰之氣上撞心心中疼熱皆心病也何前輩反有傷足不傷手之説夫心主營肺主衛風寒來傷營衛即是手經矣且大腸接胃俱稱陽明小腸通膀胱俱稱太陽傷則俱傷何分手足如大便硬是大腸病豈專指胃言小便不利亦是小腸病豈獨指膀胱且汗為心液如汗多亡陽豈獨亡坎中之陽而不涉膽中之陽耶因不明仲景之六經故有傳經之妄耳人皆指太陽經絡行於背而不知背為太陽之所主競言太陽主營衛而不究營衛之所自只知太陽主表而不知太陽實根於裡知膀胱是太陽之裡而不知心肺是為太陽之裡因不明內經之陰陽所以不知太陽之地耳內經以背為陽腹為陰五臟以心肺為陽而屬於背故仲景以胸下心下屬三陽肝脾腎為陰而屬於腹故仲景以腹中之症屬三陰以陰陽內外相輸之義也營衛行於表而發源於心肺故太陽病則營衛病營衛病則心肺病矣心病則惡寒肺病則發熱心病則煩肺病則喘桂枝療寒芍藥止煩麻黃散熱杏仁除喘所以和營者正所以寧心也所以調衛者正所以保肺也麻桂二方便是調和內外表裡兩解之劑矣如大青龍用石膏以治煩躁小青龍用五味乾薑以除咳嗽皆於表劑中即兼治里後人妄為仲景方治表而不及里曷不於藥性一思之太陽主表為心君之藩籬猶京師之有邊關也風寒初感先入太陽之界惟以得汗為急務自汗而解猶邊關之有備也必發汗而解是君主之令行也若發汗而汗不出與發汗而汗仍不解是君主之令不行也夫汗為心液本水之氣在傷寒為天時寒水之氣在人身為皮膚寒濕之氣在發汗為君主陽和之氣也君火之陽內發寒水之邪外散矣故治太陽傷寒以發汗為第一義若君火不足則腎液輸於心下者不能入心為汗又不能下輸膀胱所以心下有水氣也故利水是治傷寒之二義若君火太盛有煩躁消渴等症恐不戢而自焚故清火是太陽之反治法若君火衰微不足以自守風寒內侵於臟腑必扶陽以御之故溫補是太陽傷寒之從治法其他救敝諸法種種不同而大法不外乎此發汗利水是治太陽兩大法門發汗分形層之次第利水定三焦之高下皆所以化太陽之氣也發汗有五法麻黃湯汗在皮膚是發散外感之寒氣桂枝湯汗在經絡是疏通血脈之精氣葛根湯汗在肌肉是升提精液之清氣大青龍汗在胸中是解散內擾之陽氣小青龍汗在心下是驅逐內蓄之水氣其治水有三法乾嘔而咳水入即吐是水氣在上焦在上者汗而發之小青龍五苓散是也心下痞硬硬滿而痛是水氣在中焦中滿者瀉之於內用十棗湯大陷胸湯是也熱入膀胱小便不利是水氣在下焦在下者引而竭之桂枝去桂加茯苓白朮湯是也太陽之根即是少陰緊則為寒本少陰脈太陽病而脈緊者必無汗此雖太陽能衛外而為固令汗不出亦賴少陰能藏精而為守故不得有汗也人但知其表實而不知其里亦實故可用麻黃湯而無患若脈陰陽俱緊而反汗出者是陽不固而陰不守雖稱亡陽而陰不獨存此屬少陰者是指太陽轉屬少陰而非少陰本病太陽之虛不能主外內傷真陰之氣便露出少陰之底板少陰陰虛不能主內外傷太陽之氣便假借太陽之面目所以太陽病而脈反沉用四逆以急救其里少陰病而反熱用麻辛以微解其表此表裡雌雄相應之機也傷寒一日太陽受之即見煩躁是陽氣外發之機六七日乃陰陽自和之際反見煩躁是陰陽內陷之兆所云陽去入陰者指陽邪下膈言非專指陰經也或入太陽之府而熱結膀胱或入陽明之府而胃中乾燥或入少陽之府而脅下硬滿或入太陰而暴煩下利或入少陰而口苦燥干或入厥陰而心中疼熱皆入陰之謂後人惑於傳經之謬因不知有陰轉屬陽等義也陽明病解第二按陽明提綱以里症為主雖有表症仲景意不在表為有諸中而形諸外之謂也或兼經病仲景意不在經為表在經而根於胃也太陰陽明同處中州而太陰為開陽明為合故陽明必以閣病為主不大便固閣也不小便亦合也不能食食難用飽初欲食反不能食皆閣也自汗盜汗表開而里閣也反無汗內外皆閣也種種閣病或然或否故提綱獨以胃實為正胃實不是竟指燥糞堅硬只對下利言下利是胃家不實矣故汗出解後胃中不和而下利者不稱陽明病如胃中虛而不下利者便屬陽明即初硬後溏水穀不別雖死而不下利者總為陽明病也蓋陽明太陰同為倉廩之官而所司各別胃司納故以陽明主實脾司輸故太陰主利同一胃腑而分治如此是二經所由分也按陽明為傳化之府當更實更虛食入胃實而腸虛食下腸實而胃虛若但實不虛則為陽明之病根矣胃實不是陽明病而陽明之為病悉從胃實上得來故以胃家實為陽明一經總綱也然致實之由是宜詳審有實於未病之先者有實於得病之後者有風寒外來熱不得越而實者有妄汗吐下重亡津液而實者有從本經熱盛而實者有從他經轉屬而實者此只舉其病根在實而勿得以胃實即為可下之症身熱汗自出不惡寒反惡熱是陽明表症之提綱故胃中虛冷亦得稱陽明病者因其表症如此也然此為內熱達外之表非中風傷寒之表此時表寒已散故不惡寒裡熱閉結故反惡熱只因有胃家實之病根即見此身熱自汗出之外症不惡寒反惡熱之病情然此但言病機發現非即可下之症也必讝語潮熱煩躁脹痛諸症兼見才可下耳太陽總綱示人以正面陽明總綱反示人以底板其正面與太陽之表同又當看出陽明之表與太陽不同矣如陽明病脈遲汗出多微惡寒者是陽明之桂枝症陽明病脈浮無汗而喘者是陽明之麻黃症本論云病得之一日不發熱而惡寒者即此是已後人見太陽已得此脈症便道陽明不應有此脈症故有尚在太陽將入陽明之説不知仲景書多有本條不見而他條中發見者若始雖惡寒與反無汗等句是也以陽明表症本是汗出不惡寒故加反無字耳有本經未宣而他經發現者若太陽之頭項強痛少陽之脈弦細者是也然頭痛而項不強脈大而不弦細便是陽明之表矣夫太陽行身之後陽明行身之前所受風寒俱在營衛之表太陽營衛有虛實陽明營衛亦有虛實虛則桂枝實則麻黃是仲景治表邪之定局也仲景之方因症而設非因經而設見此症便與此方是仲景之活法後人妄以方分經絡非惟陽明不敢用二方即太陽亦棄之久矣陽明之表有二有外邪初傷之表有內熱達外之表外邪之表只在一二日間其症微惡寒汗出多或無汗而喘者是也內熱之表在一二日後其症身熱汗自出不惡寒反惡熱是也表因風寒外來故仲景亦用麻黃桂枝二湯汗之表因內熱外發故仲景更制梔子豉湯因其熱而吐之後人認不出陽明表症一二日既不敢用麻黃二三日來又不知用梔子豉湯不識仲景治陽明之初法所以廢棄陽明之吐法必待熱深實極以白虎承氣投之是養虎遺患也六經傷寒惟陽明最輕者以陽明為水穀之海穀氣足以勝邪氣陽明為十二經脈之長氣血足以禦寒氣陽明居兩陽合明之地陽氣足以御陰氣也陽明受邪一日惡寒與太陽同二日便不惡寒反惡熱故內經曰二日陽明受之以陽明之症在二日見非謂陽明之病在太陽交也仲景曰傷寒三日陽明脈大要知陽明傷寒祗在一日二日即寒去而熱生三日見陽明之脈大則全無寒氣便是陽明之病熱而非復前日之傷寒始雖由於傷寒今不再稱傷寒以傷寒之劑治之矣陽明之惡寒二日自止固與他經不同其惡寒微又不若太陽之甚陽明在肌肉中蒸蒸發熱但熱無寒與太陽翕翕發熱寒束於皮毛之上者不同陽明自汗亦異於太陽中風之自汗太陽雖自汗而出之不利有執持之意故其狀曰漐漐陽明自汗多有波瀾搖動之狀故名之曰濈濈太陽之脈浮而緊者必潮熱太陽之脈但浮者必無汗陽明脈但浮者必盜汗出二經表症表脈不同如此今傷寒書以頭痛分三陽陽明之痛在額理固然也然陽明主裡頭痛非其本症內經曰傷寒一日巨陽受之以其脈連風府故頭項痛也七日太陽病衰頭痛少愈也二日陽明受之其脈夾鼻絡於目故身熱目疼鼻乾不得臥是內經以頭痛屬太陽不屬陽明矣仲景有陽明頭痛症二條一日陽明病反無汗而小便利二三日嘔而咳手足厥者必苦頭痛若不咳不嘔手足不厥者頭不痛此頭痛在二三日而不在得病之一日且因於嘔咳而不因於外邪也一日傷寒不大便六七日頭痛不熱者與承氣湯此頭痛反在太陽衰時而因於不大便即內經所云䐜脹而頭痛非因於風寒也其中風傷寒諸條俱不及頭痛症則陽明頭痛又與太陽迥別矣本論云陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重此處當直接梔子豉湯主之句若發汗三段因不用此方而妄治所致仍當梔子豉湯主之仲景但於結句一見是省文法也後人竟認梔豉湯為汗下後救逆之劑請問未汗下前仲景何法以治之乎要知咽燥口苦腹滿而喘是陽明裡熱發熱汗出不惡寒反惡熱是陽明表熱因陽明之熱自內達表則里症為重故此條敘症以里症列表症之前任梔子以清裡熱而表熱亦解用香豉以瀉腹滿而身重亦除後人不能於仲景書中尋出陽明之表而遠引內經熱府論之目痛鼻乾不得臥以當之不得仲景陽明治表之法妄引痘科中葛根升麻以主之不知內經因論熱病而只發陽明經病之一端仲景立陽明一經是該內外症治之全法又不知目痛鼻乾是陽盛陰虛法當滋陰清火而反發陽明之汗若上而鼻衄下而便難是引賊破家矣要知是風寒之表則用麻黃而治如是內熱之表即荊防薄荷皆足以亡津液而成胃實在用者如何耳治陽明內熱之表有三法如熱在上焦者用梔子豉湯吐之上焦得通津液得下胃家不實矣熱在中焦者用白虎湯清之胃火得清胃家不實矣熱陷下焦者用豬苓湯利之火從下泄胃家不實矣要知陽明之治表熱即是預治其里三方皆是潤劑所以存津液而不令胃家實也後人因循升麻葛根之謬竟不察仲景治陽明表症之法太陽以心胸為里故用辛甘發散之劑助心胸之陽而開玄府之表不得用苦寒之劑以傷上焦之陽也所以宜汗而不宜吐陽明以心胸為表當用酸苦湧泄之劑引胃脘之陽而開胸中之表不得用溫散之劑以傷中宮之津液也故法當吐而不當汗陽明當吐而反行汗下溫針等法以致心中憒憒怵惕懊憹煩躁讝語舌苔等症然仍不離陽明之表太陽當汗而反吐便見自汗出而不惡寒飢不能食朝食暮吐不欲近衣欲食冷食等症此為太陽轉屬陽明之表皆是梔子豉湯症蓋陽明以胃實為里不特發熱惡寒汗出身重目疼鼻乾謂之表一切虛煩虛熱如口苦咽乾舌苔喘滿不得臥消渴而小便不利凡在胃之外者悉屬陽明之表但除胃口之熱便解胃家之實此梔子豉湯為陽明解表和里之聖劑也按傷寒脈浮自汗出淅淅惡寒是陽明表症心煩小便數腳攣急是陽明裡之表症斯時用梔子豉湯吐之則胃陽得升惡寒自罷心煩得止汗不自出矣上焦得通津液得下小便自利其腳自伸矣反用桂枝發汗所以亡陽其咽中干煩躁吐逆是梔子生薑豉湯症只以亡陽而厥急當回陽故改用甘草乾薑湯服之後仍作芍藥甘草以和陰少與調胃承氣以和里皆因先時失用梔豉如此挽回費力耳按仲景云病如桂枝症則便不得鑑定為太陽中風凡惡風惡寒發熱而汗自出者無論太陽陽明中風傷寒皆是桂枝症矣太陽病頭項強痛而此雲頭不痛項不強便非太陽症內經曰邪中於膚則入陽明此云胸中疼硬氣上衝咽喉不得息是陽明受病無疑也雖外症象桂枝而病在胸中不在營衛便不是桂枝症故立瓜蒂散所謂在上者因而越之也此與前條本陽明病仲景不冠以陽明者以不關於胃實而未見不惡寒之病情耳上越中清下奪是治陽明三大法發汗利小便是陽明經兩大禁然風寒初入陽明之表即用麻黃桂枝發汗者是急於除熱而存津液與急下之法同若脈浮煩渴小便不利用豬苓湯利小便者亦以清火而存津液而又曰汗多者不可與豬苓湯要知發汗利小便是治陽明權巧法門非正治法陽明之病在熱實宜無溫補法矣而食谷欲嘔者是胃口虛寒故不主內熱也然胃口雖虛胃中猶實仍不失為陽明病與吳茱萸湯散胃口之寒上焦得通津液得下胃氣因和則溫補又陽明之從治法若胃口虛熱者用白虎加人參是陽明又有涼補法也此二義又是治陽明權巧法門本論云傷寒三日三陽為盡三陰當受邪其人反能食不嘔此為三陰不受矣蓋陽明為三陰之表故三陰皆看陽明之轉施三陰之不受邪藉胃為之蔽其外也胃氣和則能食不嘔故邪自解而三陰不病胃陽虛邪始得入三陰故太陽受邪腹滿而吐食不下少陰受邪欲吐不吐厥陰受邪飢不欲食食即吐蛔若胃陽亡則水漿不入而死要知三陰受邪關係不在少陽太陽而全關係陽明陽明以太陰為里是指牝臟言太陰亦以陽明為里是指轉屬言也腎者胃之關木者土之賊故三陰亦得以陽明為里三陰為三陽之裡而三陰反得轉屬陽明為里故三陰皆得從陽明而下則陽明又是三陰實邪之出路也既為三陰之表以御邪又為三陰之裡以逐邪陽明之關係三陰重矣少陽病解第三少陽處半表半裡司三焦相火之遊行仲景特揭口苦咽乾目眩為提綱是取病機立法矣夫口咽目三者臟腑精氣之總竅與天地之氣相通者也不可謂之表又不可謂之裡是表之入里里之出表處正所謂半表半裡也三者能開能合開之可見合之不見恰合為樞之象苦幹眩者皆相火上走空竅而為病風寒雜症咸有之所以為少陽一經總綱也如目赤兩耳無聞胸滿而煩只舉中風一症之半表裡內經之胸脅痛而耳聾只舉得熱病一症之半表裡故提綱不與也少陽之表有二脈弦細頭痛發熱或嘔而發熱者少陽傷寒也耳聾目赤胸滿而煩者少陽中風也此少陽風寒之表而非少陽之半表陽明風寒之表亦有麻黃桂枝症少陽風寒之表既不得用麻黃桂枝之汗亦不得用瓜蒂梔豉之吐法發汗則讝語吐下則悸而驚是少陽之和解不特在半表而始宜也少陽初感風寒惡寒發熱與太陽同不得為半表惟寒熱不齊各相回避一往一來勢各兩分始得謂之半表耳往來寒熱有三義少陽自受寒邪陽氣尚少不能發熱至五六日鬱熱內發始得與寒氣相爭而往來寒熱一也或太陽傷寒過五六日陽氣已衰餘邪未盡轉屬少陽而往來寒熱二也若風為陽邪少陽為風藏一中於風但往來寒熱不必五六日而始見三也太陽之身寒在未發熱時如已發熱雖惡寒而身不再寒陽明之身寒惡寒只在初得之一日至二日則惡寒自罷便發熱而反惡熱惟少陽之寒熱有往而復來之異寒來時便身寒惡寒而不惡熱熱來時便身熱惡熱而不惡寒與太陽之如瘧發熱惡寒而不惡熱陽明之如瘧潮熱惡熱而不惡寒者不侔也蓋太陽為嫩陽如日初出寒留於半表者不遽散熱出於半里者未即舒故見此象耳然寒為欲去之寒而熱為新熾之熱寒固為虛寒而熱亦非實熱故小柴胡湯治熱而不治寒預補其虛而不攻其實也小柴胡為半表設而其症皆屬於里蓋表症既去其半則病機偏於向里矣惟往來寒熱一症尚為表邪未去故獨以柴胡一味主之其他悉屬用里藥凡里症屬陽者多實熱屬陰者多虛寒而少陽為半里偏於陽偏於熱雖有虛有熱不盡屬於虛也仲景又深以裡虛為慮故於半表未解時便用人參以固里寒熱往來病情見於外苦喜不欲病情得於內看苦喜不欲等字非真嘔真滿不能飲食也看往來二字即見有不寒熱時寒熱往來胸脅苦滿是無形之表心煩喜嘔默默不欲飲食是無形之裡其或胸中煩而不嘔或渴或胸中痛或脅下痞硬或心下悸小便不利或咳者此七症皆偏於里惟微熱微寒為在表皆屬無形惟脅下痞硬為有形皆風寒通症惟脅下痞硬為少陽總是氣分為病非有實熱可據故皆從半表半裡之治法少陽為遊部其氣遊行三焦循兩脅輸腠理是先天真元之氣所以謂之正氣正氣虛不足以固腠理邪因腠理之開得入少陽之部少陽主膽為中正之官正氣雖虛不容邪氣內犯必與之相搏搏而不勝所以邪結脅下也往來寒熱即正邪相爭之象更實更虛所以休作有時邪實正虛所以默默不欲飲食仲景於表症不用人參此因正邪分爭正不勝邪故用之扶元氣強主以逐寇也若外有微熱而不往來寒熱是風寒之表未解不可謂之半表當小發汗故去人參加桂心煩與咳雖逆氣有餘而正氣未虛不可益氣故去人參如太陽汗後身痛而脈沉遲與下後協熱利而心下硬是太陽之半表半裡症也表雖不解裡氣已虛故參桂兼用是知仲景用參皆是預保元氣耳更有脈症不合柴胡者仍是柴胡症本論云傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結半在裡半在表也脈雖沉緊不得為少陰者陰不得有汗今頭汗出故可與小柴胡湯此條是少陽陽明並病而脈症俱是少陰五六日又少陰發病之期若謂陰不得有汗則少陰亡陽亦有反汗出者然亡陽與陰結其別在大便亡陽則咽痛吐利除陰結則不能食而大便又反硬也亡陽與陰陽結其別在汗亡陽者衛氣不固汗出必遍身陽結者熱邪閉郁汗只在頭也陽結陽微結之別在食陽明陽盛故能食而大便硬此為純陽結少陽陽微故不能食而大便硬此為陽微結故欲與柴胡湯必究其病在半表然微惡寒亦可屬少陰但頭汗出始可屬少陽故反覆講明頭汗之義可與小柴胡而勿疑也所以然者少陽為樞少陰亦為樞故見症多相似必於陰陽表裡辨之真而審之確始可一劑而瘳此少陰少陽之疑似症又柴胡症之變局也少陽居人身之半脅居一身之半故脅為少陽之樞而小柴胡為樞機之劑也岐伯曰中於脅則入少陽此指少陽自病然太陽之邪欲轉屬少陽少陽之邪欲歸併陽明皆從脅轉如傷寒四五日身熱惡風頭項強脅下滿者是太陽並病將轉屬少陽之機也以小柴胡與之所以斷太陽之來路如陽明病發潮熱大便溏小便自可胸脅滿不去者是少陽陽明並病此轉屬陽明之路也以小柴胡與之所以開陽明之出路若據次第傳經之説必陽明始傳少陽則當大便硬而不當溏當曰胸脅始滿不當曰滿不去矣又陽明病脅下硬滿不大便而嘔舌上白苔者此雖已屬陽明而少陽之症未罷也蓋少陽之氣遊行三焦因脅下之阻隔令上焦之治節不行水精不能四布故舌上有白苔而嘔與小柴胡轉少陽之樞則上焦氣化始通津液得下胃家不實而大便自輸矣身濈然而自汗解者是上焦津液所化故能開發腠理蒸膚澤毛若霧露之溉與胃中邪熱薰蒸而自汗不解者不同東垣云少陽有不可汗吐下利小便四禁然柴胡症中口不渴身有微汗者仍加桂枝以取汗下後胸脅滿微結小便不利渴而不嘔頭汗出往來寒熱者用柴胡桂枝甘薑湯汗之下後胸滿煩驚小便不利讝語身重者柴胡龍骨牡蠣湯中同大黃茯苓以利小便柴胡症具反下之心下滿而硬痛者大陷胸湯下之醫以丸藥下之而不得利已而微利胸脅滿而嘔日晡潮熱者小柴胡加芒硝下之是仲景於小陽經中以備汗下利小便法也若吐法本為陽明初病胸中實不得食不得吐而設少陰病飲食入口即吐心下兀兀欲吐復不能吐亦是胸中實當吐之若水飲蓄於胸中雖是有形而不可為實故不可吐何則少陽之喜嘔嘔而發熱便見中氣之虛但熱而不實故用人參以調中氣上焦得通津液得下胃氣因和故少陽之嘔與讝語不並見所以嘔者是少陽本症讝語是少陽壞症然本渴而飲水嘔與但欲嘔胸中痛微溏者又非柴胡症是嘔中又當深辨也按嘔渴雖六經俱有之症而少陽陽明之病機在嘔渴中分渴則轉屬陽明嘔則仍在少陽如傷寒嘔多雖有陽明症不可攻之因三焦之不通病未離少陽也服柴胡湯已渴者屬陽明也此兩火之併合病已過少陽也夫少陽始病便見口苦咽乾目眩先已津液告竭矣故太陽之病最易轉屬於陽明所以發汗即胃實而讝語故小柴胡中已具或渴之症方中用參苓甘棗皆生津之品以預防其渴服之反渴是相火熾盛津液不足以和胃即轉屬陽明之機也少陽妄下後有二變實則心下滿而硬痛為結胸用大陷胸湯下之虛則但滿而不痛為痞用半夏瀉心湯和之此二症皆從嘔變因不用柴胡令上下不通津液不下耳本論云傷寒中風有柴胡症但見一症即是不必悉具者言往來寒熱是柴胡主症此外兼見胸脅滿硬心煩喜嘔及或為諸症中凡有一者即是半表半裡故曰嘔而發熱者小柴胡主之因柴胡為樞機之劑風寒不全在表未全入里者皆可用故症不必悉具而方有加減法也然柴胡有疑似症不可不審如脅下滿痛不渴而飲水嘔者柴胡不中與也又但欲嘔腹中痛微溏者此非柴胡症如此詳明所云但見一症便是者又當為細辨矣太陰病解第四按熱病論云太陰脈布胃中絡於嗌故腹滿嗌乾此熱傷太陰之標自陽部注經之症非太陰本病也仲景立本病為提綱因太陰主內故不及中風四肢煩疼之表又為陰中至陰故不及熱病嗌乾之症太陰為開又陰道虛太陰主脾所生病脾主濕又主輸故提綱主腹滿時痛而吐利皆是裡虛不固濕勝外溢之症也脾虛則外亦虛食不下者胃不主納也要知胃家不實即轉太陰耳世舉陽明傳少陽之謬反昧傳太陰之義熱病腹滿是熱鬱太陰之經有嗌乾可證症在表也寒溫腹滿是寒生至陰之藏有自利可證病在本也脾經有熱則陰精不上輸於肺故嗌乾臟有寒則脾不能為胃行其精液故下利夫陽明之當下因本病而太陰之下症反在標病可見陰陽異位之故又以見陰從陽轉之義也參中陰溜府之義知熱邪不遽入至陰雖熱在太陰之經而實仍在陽明之胃可知下症只在陽明太陰本無下法腹滿亦兩經之症不大便而腹滿或繞臍痛者為實熱屬陽明下利而腹滿時痛為虛寒屬太陰寒濕是太陰本症濕熱又傷寒所致之變症也其機關在小便不利則濕熱外見而身黃小便自利非暴煩下利而自愈即大便硬而不使所以然者脾膚相連此脾家實則腐穢自去而成太陰之開若胃家實則地道不通而轉陽明之合矣叔和但知有陽明不知有太陰陽明症序例謂太陰受病脈當沉細不知沉細是太陰本病之脈不是熱症嗌乾之脈蓋脈從病見如太陰中風則脈浮不從臟之陰而從風之陽也然浮為麻黃湯脈而用桂枝者以太陰是里之表症桂枝湯是里之表藥因脾主肌肉是宜解肌耳太陰傷寒脈浮而緩者亦非太陰本病蓋浮為陽脈緩為胃脈太陰傷寒脈不沉細而反浮緩是陰中有陽脈有胃氣所以手足自溫而顯脾家之實或發黃便硬而轉屬陽明此脈症在太陰陽明之間故曰系在若太陰自受寒邪不應如是矣太陰脈浮為在表當見四肢煩疼等症沉為在裡當兼腹痛吐利等症表有風熱可發汗宜桂枝湯里有寒邪當溫之宜四逆輩太陽而脈沉者因於寒寒為陰邪沉為陰脈也太陰而脈浮者因於風風為陽邪浮為陽脈也當知脈從病變不拘於經故陽經有陰脈陰經有陽脈世為脈在三陰則俱沉陰經不當發汗者未審此耳太陰中風陽微陰澀不長者為欲愈要知澀與長不是並見澀本病脈澀而轉長病始愈耳風脈本浮今浮已微知風邪當去澀則少氣少血故中風今長則氣結故愈太陰中風四肢煩疼太陰傷寒手足自溫此指表熱言也熱在四肢則身體不熱可知蓋太陰主內表當無熱惟四肢為諸陽之本脾為胃行津液以灌四旁故得主四肢則四肢之溫熱仍是陽明之陽也且曰自溫便見有時不溫有時四肢厥逆矣內經云人有四肢熱逢風而如炙如火者是陰氣虛而陽氣盛風者陽也四肢亦陽也兩陽相搏是人當肉爍此即太陰中風症要知太陰中風與三陽不同太陰之病名曰關蜤故陽邪不得深入惟病在四關久而不愈脾液不足以充肌肉故肉爍世人最多此症其有手足心熱者亦中風之輕者耳然太陰中風因陰虛而陽湊之外風為內熱所致但當滋陰以和陽不得驅風而增熱也手足自溫句暗對身不發熱言非言太陰傷寒必當手足溫也夫病在三陽尚有手足冷者何況太陰陶氏分太陰手足溫少陰手足寒厥陰手足冷是大背太陰手足煩疼少陰一身盡熱之義矣凡傷於寒則為病熱寒為陰太陰為至陰兩陰相合無熱可發惟四末為陰陽之會故尚溫耳惟手足自溫中宮不遽受邪故或發身黃或暴煩下利自止即手足自溫處因以見脾家之實也發黃自陽明病太陰身當發黃非言太陰本有發黃症也以手足溫處是陽明之陽盛寒邪不得傷太陰之臟臟無寒而身有濕故當發黃若濕從溺泄暴煩下利仍是脾主轉輸故不失為太陰病若煩而不利即胃家之熱實非太陰之濕熱矣此太陰傷寒全藉陽明之陽為之根故有轉屬之症也人知傷寒以陽為主不知太陰傷寒以陽明為主東垣以有聲無聲分嘔吐非也嘔吐皆有聲有物惟乾嘔是有聲無物嘔以水勝屬上焦也吐以物勝屬中焦也六經皆有嘔屬少陽以喜嘔故吐屬太陰而不屬陽明亦主輸主內之分太陽以陰為根而太陰以陽為本太陽不敢妄汗尤恐亡少陰之津也太陰不敢輕下恐傷陽明之氣也太陰本無下症因太陽妄下而陽邪下陷於太陰因而有桂枝湯加芍藥等法太陰脈弱知胃氣已動便當少加矣此因裡急後重者不可不用又不可多用故如此叮嚀耳少陰病解第五少陰一經兼水火二氣寒熱雜居故為病不可捉摹其寒也症類太陰其熱也症似太陽故仲景以微細之病脈欲寐之病情為提綱立法於象外使人求法於病中凡症之寒熱之真假仿此義以推之其陰陽虛實見矣五經提綱皆是邪氣盛則實惟少陰提綱是指正氣奪則虛者以少陰為人身之本也然邪氣之盛亦因正氣之虛故五經皆有可溫可補症正氣之奪亦因邪氣之盛故少陰亦有汗吐下症要知邪氣盛而正氣已虛者固本即以逐邪正不甚虛而邪氣實者逐邪正所以護正此大法也少陽為陽樞少陰為陰樞弦為木象弦而細者是陽之少也微為水象微而細者是陰之少也此脈氣之相似衛氣行陽則寤行陰則寐其行陽二十五度常從足少陰之分間行臟腑少陰病則樞機不利故欲寐也與少陽喜嘔者同嘔者主出陽主外也寐者主入陰主內也喜嘔是不得嘔欲寐是不得寐皆在病人意中得樞機之象如此少陰脈微不可發汗亡陽故也脈細沉數病為在裡不可發汗然可汗之機亦見於此夫微為無陽數則有復陽矣須審其病為在裡而禁汗不得拘沉為在裡而不發汗也發汗脈沉者是病為在表以無里症故可發汗若脈浮而遲表熱裡寒下利清穀是遲而無陽病為在裡又不得以浮為在表而發汗矣要知陰中有陽沉亦可汗陽中有陰浮亦當溫若八九日一身手足本熱是自里達表陽盛陰虛法當滋陰又與二三日無里症者不侔太陰是陽明之裡陽明不惡寒故太陰雖吐利腹痛而無惡寒症少陰是太陽之裡太陽惡寒故少陰吐利必惡寒陰從陽也太陰手足溫者必暴煩下利而自愈是太陰藉胃脘之陽少陰吐利亦必手足溫者可治手足厥者不治是下焦之虛寒既侵迫於中宮而胃脘之陽仍得敷於四末始知先天之元陽仍賴後天之胃氣培植也太陽是少陰之標太陰是少陰之本少陰陰虛則移熱於膀胱故一身手足盡熱而便血從標也少陰陽虛則移寒於脾而吐利從本也少陰傳陽症有二六七日腹脹不大便者是傳陽明臟氣實則還之腑也八九日一身手足盡熱者是傳太陽陰出之陽下利極而上也熱在膀胱而便血亦臟病傳腑此陰乘陽也然氣病而傷血又陽乘陰也亦見少陰中樞之象此是自陰轉陽與太陽熱結膀胱血自下者見症同而病因異少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者雖煩利必自愈此亦是脾家實露出太陽底板故得與太陰七八日暴煩下利自止同蓋少陰來復之陽微則轉屬太陰而穢腐自去盛則轉屬陽明而糟粕不傳鬱則內實而入陽明大府廣腸之區橫則外達而遍太陽內外盛血之部要知緊脈轉微是復少陰本脈故轉太陰而自解脈沉細數是兼陽脈故入陽經而為患然熱雖甚不死亦陰自陽則解之變局也六經皆有煩躁而少陰更甚者以其陰之虛也蓋陽盛則煩陰極則躁煩屬氣躁屬形煩發於內躁見於外是形從氣動也先躁而後煩是氣為形役也不躁而時自煩是陽和漸回故可治不煩而躁是五臟之陽已竭惟魄獨居故死故少陰以煩為生機躁為死兆傷寒以陽為主不特陰症見陽脈者生亦陰病見陽症者可治也凡蜷臥四逆吐利交作純陰無陽之症全賴一陽來復故反煩者可治手足反溫者反發熱者不死太陽少陰皆有身痛骨節痛之表水氣為患之裡太陽則脈浮緊而身發熱用麻黃湯發汗是振營衛之陽以和陰也少陰之脈沉而手足寒用附子湯溫補是扶坎中之陽以配陰也太陽之水屬上焦小青龍汗而發之陽水當從外散也少陰之水屬下焦真武湯溫而利之陰水當從下泄也陰陽俱緊與太陽傷寒相似夫緊脈為寒當屬少陰然病發於陰不當有汗反汗出者陰極似陽陽虛不能藏精所致也亡陽之前已先亡陰矣陽無所依故咽痛嘔吐見陽虛之不歸陰不能藏故下利不止見真陰之欲脫也則附子湯用三白以滋陰參附以回陽為少陰反本還元之劑腎主五液入以為汗少陰受病液不上升所以陰不得有汗仲景治少陰之表於麻黃細辛中加附子是升陽液而為汗也若真陰為邪熱所逼則水隨火越故反汗出仲景治少陰之裡附子湯中任人參是補腎液而止汗也脈陰陽俱緊口中氣出條是少陰經文王氏集之脈法中故諸家議論不一夫少陰脈絡肺主鼻故鼻中涕出少陰脈絡舌本故舌上苔滑少陰大絡注諸絡以溫足脛故足冷此症不名亡陽者因不汗出內不吐利也口中氣出唇口燥干鼻中涕出此為內熱陰陽脈緊舌上苔滑蜷臥足冷又是內寒此少陰為樞故見寒熱相持之症而口舌唇鼻之半表半裡恰與少陽之口苦咽乾目眩相應也勿妄治者恐陰陽相持苟清火溫補等法用之不當寧靜以待之至七日來復微發熱手足溫是陰得陽之解也故八日以上反大發熱再加吐利即是亡陽若其人反加微寒寒甚於表上焦應之必欲嘔矣若加腹痛是寒甚於里中焦受之必欲利矣當此陰盛急當扶陽庶不為假熱所惑而妄治但欲寐即是不得眠然但欲寐是病情乃問而知之不得眠是病形可望而知之欲寐是陰虛不眠是煩躁故治法不同三陽惟少陽無承氣症三陰惟少陰有承氣症少陽為陽樞陽稍虛便入於陰故不得妄下以虛其元陽少陰為陰樞陽有餘便傷其陰故當急下以存其真陰且少陽屬木惟畏其剋土故無下症少陰主水更畏有土製故當急下蓋真陰不可虛強陽不可從也少陰病用大承氣急下者有三病症得病三二日熱淫於內腎水不支因轉屬陽明胃火上炎故口燥咽乾也急下之穀氣下流津液得生矣得病六七日當解不解津液枯涸因轉屬陽明故腹脹不大便所謂已入於腑者下之則脹已宜於急下者六七日來陰虛已極恐土實於中心腎不交耳若自利純清水心下痛口燥舌乾者是土燥火炎脾氣不濡胃氣反厚水去而谷不去故宜於急下少陰為性命之樞少陰病是死生關故六經中獨於少陰曆言死症然少陰中風始得時尚有發熱脈沉可證若初受傷寒其機甚微脈細微但欲寐口中和背惡寒人已皆不覺其為病也若身體疼手足寒骨節痛脈浮者此表中陽虛症心中煩不得臥此里之陰虛症也若下利咽痛胸滿心煩與口中氣出唇口燥干鼻中涕出蜷臥足冷舌上苔滑者此少陰半表半裡陰陽駁雜之症也脈陰陽俱緊反汗出而咽痛吐利者此陰極似陽腎陽不歸為亡陽症也若至八九日一身盡熱者是寒極生熱腎陽鬱極而勝復太過也其腹痛下利小便不利者有水火之分若四肢沉重疼痛為有水氣是陽虛而不勝陰也若便膿血與泄利下重者此為火此陽邪陷入陰中也下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤者是下虛而極陽也吐利兼作手足逆冷煩躁欲死者是陰極而發躁也岐伯曰陰病治陽陽病治陰定其中外各守其鄉此即仲景治少陰之大法也同是惡寒蜷臥利止手足溫者可治利不止手足逆冷者不治時自煩欲去衣被者可治不煩而躁四逆而脈不至者死同是吐利手足不逆冷反發熱者不死煩躁四逆者死同是嘔吐汗出大便數少者可治自利煩躁不得臥者死蓋陰陽互為其根陰中無陽則死獨陰不生故也厥陰病解第六太陰厥陰皆以里症為提綱太陰為陰中之至陰而主寒故不渴厥陰為陰中之陽而主熱故消渴也太陰主濕土土病則氣陷下濕邪入胃故腹痛自利厥陰主相火火病則氣上逆火邪入心故心中疼熱也太陰腹滿而吐食不下厥陰飢不欲食食即吐蛔同是食不下太陰則滿厥陰則飢同是一吐太陰則吐食厥陰則吐蛔此又屬土屬木之別也太陰為開本自利而下之則開拆胸下結硬者開拆反合也厥陰為合氣上逆而下之則合拆利不止者合拆反開也兩陰交盡名曰厥陰又名陰之絶陽是厥陰宜無熱矣然厥陰主肝而膽藏內則厥陰熱症皆少陽相火內發也要知少陽厥陰同一相火相火鬱於內是厥陰病相火出於表為少陽病少陽咽乾即厥陰消渴之機胸脅苦滿即氣上撞心之兆心煩即疼熱之初不欲食是飢不欲食之根喜嘔即吐蛔之漸故少陽不解轉屬厥陰而病危厥陰病衰轉屬少陽而欲愈如傷寒熱少厥微指頭寒不欲食至熱除欲食其病愈者是也太陰提綱是內傷寒不是外感厥陰提綱是溫病而非傷寒要知六經各有主症是仲景傷寒雜病合論旨也諸經傷寒無渴症太陽不惡寒而渴是溫病矣雜症矣惟厥陰傷寒肝木鬱而不得出熱甚於內欲竊母氣以剋火故渴欲飲水若不惡寒當作溫病治之要知溫乃風木之邪是厥陰本病消渴是溫病之本厥利是溫病之變內經所謂熱病皆傷寒之類此正其類矣厥陰消渴即以水飲之所以順其欲然少與之可以平亢火多與之反以益陰邪當量其消與不消恐水漬入胃耳渴欲飲水與飢不欲食對看始盡厥陰病情手足厥冷脈微欲絶是厥陰傷寒之外症當歸四逆是厥陰傷寒之表藥夫陰寒如此而不同薑附者以相火寄於肝位雖寒而臟不寒故先厥者後必發熱手足愈冷肝膽愈熱故厥深熱亦深所以傷寒初起脈症如此者不得遽認為虛寒妄投薑附以遺患也厥者必發熱熱與厥相應熱深厥亦深熱微厥亦微此四症是厥陰傷寒之定局先熱後厥厥熱往來厥多熱少熱多厥少此四症是厥陰傷寒之變局皆因其人陽氣多寡而然如太陽傷寒亦有已發熱未發熱之互辭也內經之寒熱二厥因於內傷與本論因外邪者不同內經熱厥只在足心是腎水起湧泉之下也本論熱厥因熱在肝臟而手足反寒故曰厥深熱亦深內經之寒厥有寒無熱本論之寒厥先厥者後必發熱熱勝則生寒勝則死此內傷外感之別厥陰有晦朔合具之理陰極陽生故厥陰傷寒反以陽為主厥少熱多是為生陽故病當愈厥多熱少是為死陰故病為進如熱氣有餘者或便膿血或發癰膿亦與內經熱厥不同陰氣起於五指之裡陽氣起於五指之表氣血和調營衛以行則陰陽相貫如環之無端也厥陰無陽厥陰病則陰陽不順接故手足逆冷若熱少厥微而指頭寒知病可愈手足反溫者雖下利必自愈此陰陽自和而順接也蓋脈微煩躁灸厥陰厥不還者死是陰陽之氣絶矣本論云諸四逆厥者不可下又曰厥應下之而反發汗者必口傷爛赤二義不同當理會上下文蓋諸四逆是指虛寒症言故曰虛家亦然應下之是單指熱厥言故曰厥深熱亦深蓋發汗只能引火上升不能逐熱外散故令口傷若手足厥冷脈微欲絶此時外寒切迫內熱未起又當發汗厥而脈微欲絶是傷寒所起之脈所謂不可下者是矣脈滑而厥是內熱閉郁之脈所謂厥應下之是已下之是下其熱非下其實泄利下重者四逆散欲飲水數升者白虎湯此厥陰之下藥所以下無形之邪也若以承氣下之利不止矣診厥陰病以陽為主而治厥陰病以陰為主故當歸四逆不去芍藥白頭翁湯重用連柏烏梅丸用黃連至一斤又佐黃柏六兩復脈湯用地黃至一斤又佐麥冬八兩要知脈微欲絶手足厥冷者雖是陰盛亦不陽虛故即可表散外邪而不可固里脈代結心動悸者似乎陽虛實為陰弱只可太劑滋陰而不可溫補所以然者肝之相火本少陽之生氣而少陽實出於坎宮之真陰經曰陽豫之正陰為之主又曰陰虛則無氣又曰少火生氣壯火實氣審此則知治厥陰之理矣中州四肢皆脾所主厥陰傷寒手足逆冷而又下利是木剋土也復發熱者下利必自止火生土也若肝火上行逼心故反汗出氣上撞心心不受邪因而越之故咽中痛而喉為痹耳若發熱而利汗出不止者死是陽虛外亡為有陰無陽與少陰亡陽同義若肝火內行而入脾土火合德必無汗而利自止若發熱而利不止此肝火內陷血室不寧故便膿血若發熱下利至甚厥不止者死是土敗木賊諸陽之本絶也厥陰傷寒有乘脾乘肺二症疑似難明最當詳辨一曰傷寒腹滿讝語寸口脈浮而緊此肝乘脾也名曰縱刺期門夫腹滿讝語似胃家實然脈浮緊而不潮熱非陽明脈也脈法曰脈浮而緊者名曰弦此弦為肝脈矣內經曰諸腹脹大皆屬於熱又曰肝氣盛則多言是腹滿由肝火而讝語乃肝氣所發也木旺則侮其所勝直犯脾土故名縱一曰傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿此肝乘肺也名曰橫刺期門夫發熱惡寒似太陽之表未經大汗而大渴非轉屬陽明未經妄下而腹滿非轉屬太陰且頭不痛胃不實不下利斷非三陰症矣要知發熱惡寒是肺病肺虛而肝火乘之脾畏木邪水精不上歸於肺故大渴肺不能通調水道故腹滿是侮所不勝寡於畏也故名橫一縱而乘脾一橫而乘肺總是肝有亢火當瀉無補必刺期門隨其實而瀉之募原清則三氣皆順表裡盡解矣此非汗吐下清利諸法所可治故宜針傷寒陽脈澀陰脈弦腹中急痛者此亦肝乘脾也故先與小建中安脾繼與小柴胡疏木要知小建中是桂枝湯加芍藥以平肝加飴糖以緩急為厥陰傷寒驅邪發表和中止痛之神劑也不瘥者中氣虛而不振邪尚留連繼以小柴胡補中發表令木邪直走少陽使有出路所謂陰出之陽則愈也仲景有一症而用兩方者在太陽先麻黃繼桂枝是先外後內法在厥陰先建中繼柴胡是先內後外法亦是令厥陰轉屬少陽之機傷寒厥而心下悸者此亦肝乘肺也雖不發熱惡寒亦木實金虛水氣不利所致彼腹滿者是水氣在中焦故刺期門以瀉其實此水在上焦故用茯苓甘草湯以發其汗此方是代水為汗發邪內散之劑即厥陰治厥之劑也厥陰中風之脈與他經不同凡脈浮為風此云不浮為未愈是厥陰中風脈反沉矣此木猶陰處風入地中木鬱不舒故未愈微浮是風行地上草木發陳復厥陰風木之常故愈也凡脈浮為在表沉為在裡厥陰中風其脈既沉其症亦為在裡此熱利下重是厥陰中風也太陽中風下利嘔逆是有水氣厥陰中風熱利下重是有火氣故以白頭翁為主以治風芩連為輔以清火佐秦皮以升九地之風則肝木欣欣向榮矣下利而渴欲飲水是厥陰之消渴亦中風之煩所致也下利脈沉弦是沉為在裡弦為風脈弦而大是風因火動故利未止微弱數者是風少火微故為自止雖發熱不死者陰出之陽也下利有微熱汗出是中風本症里症出表則風從外散故令自愈欲愈之脈當微浮若寸脈反浮數風去而熱不去尺中自澀者熱屬陰絡肝血不藏必便膿血也厥陰中風之熱利是里有熱傷寒亦有熱利是里有寒又與厥利不同厥利見發熱則利止此六七日不利便發熱而利汗出不止是外熱內寒故謂之有陰無陽要知內經之舌卷囊縮是有陽無陰故熱雖甚而可治陰陽易之為病本於厥陰之欲火始也因肝火之動致傷少陰之精繼也少陰之精不藏厥陰之火不羈所以少陰裡虛陰中拘攣熱上衝胸眼中生花頭重不欲舉皆厥陰相火為眚頓令無病之人筋脈形氣為之一變此即溫疫傳染遺禍他人之一症也制方大法第七凡病有名有症有機有情如中風傷寒溫暑濕痓等類此為名也外有頭痛身熱腰痛內有喘咳煩渴吐利脹滿所謂症也其間在表在裡有汗無汗脈沉脈浮有力無力是其機也此時惡寒惡熱苦滿喜嘔能食不能食欲寐不得臥或飲水數升或嗽水不欲咽皆病情也因名立方者粗工也據症定方者中工也於症中審病機察病情者良工也仲景制方不拘病之命名惟求症之切當知其機得其情凡中風傷寒雜病宜主某方隨手拈來無不合法此謂醫不執方也今談仲景方者皆曰桂枝湯治中風不治傷寒麻黃湯治傷寒不治中風不知仲景此方主何等症又不察仲景何症用何等藥只在中風傷寒二症中相較青龍白虎命名上敷衍將仲景活方活法為死方死法矣仲景立方精而不雜其中以六方為主諸方從而加減也凡汗劑皆本桂枝吐劑皆本梔豉攻劑皆本承氣和劑皆本柴胡寒劑皆本瀉心溫劑皆本四逆渾而數之為一百十三方者未之審也六經各有主治之方而他經有互相通用之妙如桂枝麻黃二湯為太陽營衛設而陽明之病在營衛者亦用之真武湯為少陰水氣設而太陽之汗後亡陽者亦用之四逆湯為太陰下利清穀設太陽之脈反沉者亦宜之五苓散為太陽消渴水逆設陽明之飲水多者亦宜之豬苓湯為少陰下利設陽明病小便不利者亦宜之抵當湯為太陽瘀血在裡設陽明之蓄血亦用之瓜蒂散為陽明胸中痞硬設少陰之溫溫欲吐者亦用之合是症便用是方方各有經而用可不拘是仲景法也仲景立方只有表裡寒熱虛實之不同並無傷寒雜病中風之分別且風寒有兩湯迭用之妙表裡有兩方更換之奇或以全方取勝或以加減奏功前人論方不論症故反以仲景方為難用耳桂枝汗劑中第一品也麻黃之性直達皮毛生薑之性橫散肌肉故桂枝佐麻黃則開玄府而逐衛分之邪令無汗者有汗而解故曰發汗桂枝率生薑則開腠理而驅營分之邪令有汗者復汗而解故曰解肌解肌解肌肉之邪也正在營分何立三綱者反云麻黃主營桂枝主衛耶麻黃湯不言解肌而肌未嘗不解桂枝湯之解肌正所以發汗要知桂枝麻黃是發汗分淺深之法不得以發汗獨歸麻黃不得以解肌與發汗對講前人論方不論藥祗以二方為談柄而置之不用也凡風寒中人不在營衛即在腠理仲景制桂枝湯調和營衛制柴胡湯調和腠理觀六經症知仲景獨出桂枝症柴胡症之稱見二方任重不可拘於經也惟太陽統諸陽之氣六經表症咸屬於太陽故柴胡湯得與桂枝湯對待於太陽之部桂枝本為太陽風寒設凡六經初感之邪未離營衛者悉宜之柴胡本為少陽半表凡三陽在表之邪還在腠理者悉宜之仲景一書最重二方所以自為桂枝注釋又為小柴胡注釋桂枝有疑似症柴胡亦有疑似症桂枝有壞症柴胡亦有壞症桂枝症罷桂枝不中與矣而隨症治法仍不離桂枝方加減柴胡症罷柴胡不中與矣而設法救逆仍不出柴胡湯加減麻黃湯症熱全在表桂枝之自汗大青龍之煩躁皆兼裡熱仲景於表劑中便用寒涼以清裡自汗是煩之兆煩是躁之徵汗出則煩得外泄故不躁宜用微寒酸苦之味以和之汗不出則煩不得泄故躁宜用大寒堅重之品以清之夫芍藥石膏是里藥今人見入表劑中不審表中有里因生疑畏當用不用至熱並陽明而班黃狂亂是不任大青龍之故也仲景於太陽經中用石膏以清胃火是預保陽明之先著加薑棗以培中氣又慮夫轉屬太陰矣青龍柴胡皆是兩解表裡之劑小青龍重在裡症小柴胡重在表症故小青龍加減麻黃可去小柴胡加減柴胡獨存蓋小青龍重在半里之水小柴胡重在半表之熱也小青龍治傷寒未解之水氣故用溫劑汗而發之十棗湯治中風已解之水氣故用寒劑引而竭之此寒水風水之異治也小青龍之水動而不居五苓散之水留而不行十棗湯之水縱橫不羈大陷胸之水痞硬堅滿真武湯之水四肢沉重水氣為患不同所以治法各異林億云瀉心本名理中黃連人參湯蓋瀉心療痞正是理中處當知仲景用理中有寒熱兩法一以扶陽一以益陰也邪在營衛之間惟汗是其出路故立麻黃桂枝二方邪在胸腹之間惟吐是其出路故立瓜蒂梔豉二方瓜蒂散主胸中痞硬治在上焦梔豉湯主腹滿而喘治兼中焦猶麻黃湯之主皮膚桂枝湯之主肌肉也瓜蒂散峻劑也猶如麻黃湯之不可輕用梔豉湯輕劑也猶如桂枝湯可更用而無妨故太陽表劑多從桂枝湯加減陽明表劑多從梔子湯加減陽明用梔子猶太陽用桂枝既可用之以驅邪即可用之以救逆今人但知汗為解表而不知吐亦為解表知吐中便能發散之説不知所以當吐之義故於仲景大法中取其汗下遺其吐法耳少陽為樞不全在裡不全在表仲景本意重里而柴胡所主又在半表故必見半表病情乃得從柴胡加減如悉入在裡則柴胡非其任矣故柴胡稱解表之方小柴胡雖治在半表實以理三焦之氣所以稱樞機之劑如胸滿胸中煩心煩心下悸喜嘔喝咳是上焦無開發之機也腹痛脅下痞硬不欲飲食是中焦廢轉運之職也小便不利是下焦失決瀆之任也皆因邪氣與正氣相搏而然用人參扶三焦之正氣壯其樞耳四逆為太陰主方而諸經可以互用在太陰本經固本以逐邪也用於少陰溫土以制水也用於厥陰和土以生木也用於太陽益火以扶元陽也惟陽明胃實少陽相火非所宜耳少陰病四五日腹痛小便不利下利不止若四肢沉重疼痛者為下焦水鬱用真武湯是引火歸元法若便膿血者為下焦火鬱用桃花湯是升陽散火法此因坎中陽虛不得以小便不利作熱治少陰病二三日心中煩不得臥者病本在心法當滋離中之真水隨其勢之潤下故君黃連之苦寒以火泄之四五日小便不利下膿血者病本在腎法當升坎中之少火順其性之炎上故佐乾薑之苦溫以發之此伏明之火與升明之火不同治少陰心煩欲寐五六日欲吐不吐自利而渴小便色白者是下焦虛寒不能制火宜真武湯以溫下焦之腎水下利六七日咳而嘔渴心煩不眠是上焦虛熱水精不布宜豬苓以通上焦之津液厥陰下利用白頭翁湯升陽散火是火鬱達之也制烏梅丸以救火是曲直作酸之義佐苦寒以和陰主溫補以存陽是肝家調氣之法也烏梅丸治傷寒之厥利與久利故半兼溫補白頭翁湯主中風之熱利與下重故專於涼散小柴胡為少陽主方烏梅丸為厥陰主方二方雖不同而寒溫互用攻補兼施之法相合者以臟腑相連經絡相貫風木合氣同司相火故也其中皆用人參補中氣以固本逐邪而他味俱不相襲者因陰陽異位陽宜升散故主以柴胡陰宜收降故主以烏梅陽主熱故重在寒涼陰主寒故重用辛熱陽以動為用故湯以蕩之其症變幻不常故柴胡有加法陰以靜為體故丸以緩之其症有定局故烏梅無加減法也手足厥逆之症有寒有熱有表有里四逆散解少陰之裡熱當歸四逆散散厥陰之表寒通脈四逆挽少陰真陽之將亡茯苓四逆留太陽真陰之欲脫四方更有輕重淺深之別也按發表攻裡乃御邪之長技蓋表症皆因風寒如表藥用寒涼則表熱未退而中寒又起所以表藥必用桂枝發表不遠熱也然此為太陽表熱言耳如陽明少陽之發熱則當用柴芩梔豉之類主之裡熱皆因鬱熱下藥不用苦寒則瘀熱不除而邪無出路所以攻劑必用大黃攻裡不遠寒也然此為陽明胃熱言耳如惡寒痞硬陽虛陰結者又當以薑附巴豆之類兼之矣麻黃桂枝太陽陽明表之表藥瓜蒂梔豉陽明裡之表藥小柴胡少陽半表之全藥太陰表藥桂枝湯少陰表藥麻黃附子細辛湯厥陰表藥當歸四逆湯六經之用表藥為六經風寒之出路也膀胱主水為太陽之裡十棗五苓為太陽水道之下藥胃腑主谷為陽明之裡三承氣為陽明穀道之下藥膽腑主氣為少陽之裡大柴胡為少陽氣分之下藥此三陽之下藥三陽實邪之出路也大腸小腸俱屬於胃胃家實則二腸俱實矣若三分之則調胃承氣胃家之下藥小承氣小腸之下藥大承氣大腸之下藥戊為燥土庚為燥金故加芒硝以潤之也桂枝加大黃太陽轉屬陽明之下藥桂枝加芍藥太陽轉屬太陰之下藥凡下劑兼表藥者以未離於表也柴胡加芒硝湯少陽轉屬陽明之下藥大柴胡下少陽無形之邪柴胡加芒硝下少陽有形之邪桂枝加芍藥下太陰無形之邪三物白散下太陰有形之邪四逆散下少陰厥陰無形之邪承氣下諸經有形之邪也下劑之輕者只用氣分藥下劑之重者兼用血分藥酸苦湧泄下劑之輕者故芍藥枳實為輕劑鹹苦湧泄下劑之重者故大黃芒硝為重劑仲景用攻下二字不專指大便凡與桂枝湯欲攻其表此指發汗言表解者乃可攻之指利水言有熱屬臟者攻之指清火言寒濕在裡不可下指利水言以有熱故也當以法下之指清火言也仲景下劑只重在湯故曰醫以丸藥下之非其治也觀陷胸抵當二丸仍用水煮是丸復為湯化而連滓服則勢力更猛於湯散矣當知仲景方以銖兩分數者非外感方丸藥如梧桐子大每服數十丸者不是治外感法仲景制方療病隨立方禁於後使人受其功不蹈其弊也如用發表藥一服汗者停後服若脈浮緊發熱汗出者不可與桂枝若脈微弱汗出惡風者不可服大青龍脈浮發熱無汗表不解者不可與白虎諸亡血虛者不可用瓜蒂病人舊微溏者不可與梔子豉湯陽明病汗多者不可與豬苓湯外未解其熱不潮者未可與承氣嘔家不可與建中觀種種方禁當知仲景立方慎重之心也仲景加減中有深意如腹中痛者少陽加芍藥少陰加附子太陰加人參如心下悸者少陰加桂枝少陽加茯苓若渴者太陽加栝蔞根人參太陰加白朮仲景於加減中分陰陽表裡如此故細審仲景方知隨症立方之妙理會仲景加減法知其用藥取藥之精小青龍設或然五症加減法內即備五方小柴胡設或然七症即加減七方要知仲景有主治之方如桂枝麻黃等方是也有方外之方如桂枝湯加附子加大黃是也有方內之方如青龍真武輩之有加減是也仲景書法外有法方外有方何得以三百九十七法一百一十三方拘之也耶昔岐伯創七方以制病仲景更窮其病之變幻而盡其精微如發表攻裡乃逐邪大法而發表攻裡之方各有大小如小青龍柴胡陷胸承氣是也夫發表既有麻黃桂枝方矣然有里邪夾表而見者治表不及里非法也而里邪又有夾寒夾熱之不同故制小青龍以治表熱裡寒制大青龍以治表寒裡熱是表中更兼解里必如壞病之先里後表先表后里之再計也然大小青龍即麻桂二湯之變只足以解營衛之表不足以驅腠理之邪且邪留腠理之間半表之往來寒熱雖同而半表又有夾虛夾實之懸殊因制小柴胡以防半里之虛大柴胡以除半里之實是表中便見和里豈若後人先攻後補先補後攻之斟酌也攻裡既有調胃承氣矣然里邪在上焦者有夾水夾痰之異在中焦者有初硬後溏燥屎定硬之分非調胃一劑所能平也因制小陷胸以清胸膈之痰大陷胸以下胸膈之水小承氣以試胃家之失氣大承氣以攻腸胃之燥屎方有分寸邪去而元氣無傷不致有顧此遺彼太過不及之患也按發表攻裡之方各有緩急之法如麻黃湯大承氣汗下之急劑也桂枝即發表之緩劑其用桂枝諸法是緩汗中更有輕重矣小承氣下藥之緩劑也曰少與之令小安曰微和胃氣曰不轉失氣者令更與之其調胃承氣則下劑之尤緩者也曰少少溫服之且不用氣分藥更加甘草是緩下中亦有差別矣若夫奇偶之法諸方既已備見桂枝二方各半之偶桂枝二麻黃一之奇是奇偶中各有淺深也服桂枝湯已須更吃稀粥為復方矣而更有取小柴胡服一升加芒硝之復是復方中又分汗下二法矣若白散之用復方更異不利進熱粥一杯利不止進冷粥一杯是一粥又寓熱瀉冷補之二法也病有虛實相關寒熱夾雜有時藥力所不能到者仲景或針或灸以治自後世針藥分為兩途豈知古人刺藥相須之理按岐伯風厥表裡刺之飲之以湯故仲景治太陽中風服桂枝湯反煩不解者刺風池風府復與桂枝湯而愈陽明中風刺之瘥如外不解脈弦浮者與小柴胡脈但浮無餘症者與麻黃湯吾故曰仲景治法悉本內經先聖後聖其揆一也仲景方備十劑之法輕可散實麻黃葛根諸湯是已宣可決壅梔豉瓜蒂二方是已通可引滯五苓十棗之屬是已澀可固脫赤石脂桃花湯是已補可扶弱附子理中丸是已重可鎮怯禹餘糧代赭石是已濕可潤燥黃連阿膠湯是已燥可去濕麻黃連翹赤小豆湯是已寒能勝熱白虎黃連湯是已熱能制寒白通四逆諸湯是已
